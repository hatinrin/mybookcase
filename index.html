<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rafım</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#F4F9F1;--surface:#FFFFFF;--surface2:#F0F7EC;
  --pink:#E05C85;--pink-pale:#FDEEF3;
  --green:#4E9A6A;--green2:#7BBF90;--green3:#C2E5CE;--green4:#EAF7EE;
  --sky:#60AADC;--lav:#9B7EC8;
  --text:#2A3828;--text2:#4A6048;--text3:#7A9070;
  --border:#CAE0BE;--border2:#DDEEDD;
  --shelf:#D0E5C2;--shelf-edge:#88A878;--shelf-top:#A8C898;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;}

/* ── LIBRARY ── */
#lib{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;}
#lib.hide{display:none;}
.hdr{background:var(--surface);padding:14px 36px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--green3);box-shadow:0 2px 12px rgba(78,154,106,.09);position:sticky;top:0;z-index:50;}
.hdr-left{display:flex;align-items:center;gap:12px;}
.logo{font-size:28px;}
.app-name{font-size:23px;color:var(--green);font-weight:700;letter-spacing:.5px;}
.app-sub{font-size:11px;color:var(--pink);letter-spacing:1.5px;font-weight:500;margin-top:1px;}
.add-btn{background:linear-gradient(135deg,var(--pink),#C0406A);color:#fff;border:none;padding:9px 20px;border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 3px 10px rgba(224,92,133,.28);transition:all .2s;}
.add-btn:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(224,92,133,.38);}
.shelf-wrap{flex:1;padding:28px 36px;}
.shelf-lbl{font-size:10.5px;color:var(--green);letter-spacing:2.5px;text-transform:uppercase;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.shelf-lbl::after{content:'';flex:1;height:1px;background:var(--border2);}
.shelf{background:var(--shelf);border-radius:8px 8px 3px 3px;padding:16px 20px 0;position:relative;box-shadow:inset 0 -5px 12px rgba(100,140,80,.18),0 8px 0 var(--shelf-edge),0 10px 16px rgba(100,140,80,.15);}
.shelf::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(to bottom,var(--shelf-top),var(--shelf));border-radius:8px 8px 0 0;}
.books{display:flex;gap:12px;align-items:flex-end;padding-bottom:20px;flex-wrap:wrap;min-height:195px;}
/* Book */
.bk{cursor:pointer;transition:transform .22s;position:relative;flex-shrink:0;}
.bk:hover{transform:translateY(-12px);}
.bk-cover{width:110px;height:160px;border-radius:2px 6px 6px 2px;position:relative;overflow:hidden;box-shadow:-5px 5px 12px rgba(0,0,0,.25),inset -3px 0 6px rgba(0,0,0,.15);}
.bk-cover img{width:100%;height:100%;object-fit:cover;display:block;}
.bk-fallback{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:12px 10px;}
.bk-spine{position:absolute;left:0;top:0;bottom:0;width:11px;background:rgba(0,0,0,.25);border-right:1px solid rgba(255,255,255,.08);}
.bk-ttl{font-size:11px;font-weight:700;color:rgba(255,255,255,.96);text-align:center;margin-left:11px;line-height:1.3;text-shadow:0 1px 4px rgba(0,0,0,.5);}
.bk-auth{font-size:9px;color:rgba(255,255,255,.62);text-align:center;margin-left:11px;margin-top:5px;}
.bk-prog{position:absolute;bottom:0;left:11px;right:0;height:3px;background:rgba(0,0,0,.2);}
.bk-prog-fill{height:100%;background:rgba(255,255,255,.8);}
.bk-bdg{position:absolute;top:5px;right:5px;font-size:8px;padding:2px 5px;border-radius:6px;font-weight:700;z-index:2;}
.bdg-done{background:rgba(78,154,106,.9);color:#fff;}
.bdg-new{background:rgba(224,92,133,.9);color:#fff;}
.bk-meta{margin-top:7px;}
.bk-name{font-size:10.5px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;font-weight:500;}
.bk-pct{font-size:9.5px;color:var(--green);font-weight:600;margin-top:1px;}
/* Add card */
.add-card{width:110px;height:160px;border:2px dashed var(--green3);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;gap:6px;background:rgba(255,255,255,.5);}
.add-card:hover{border-color:var(--green);background:var(--green4);transform:translateY(-8px);}
.add-card-icon{font-size:22px;}
.add-card-txt{font-size:10px;color:var(--text3);text-align:center;line-height:1.6;}
/* Stats */
.stats{background:var(--surface);border-top:1px solid var(--border2);padding:11px 36px;display:flex;gap:0;}
.stat{display:flex;align-items:center;gap:8px;padding-right:22px;margin-right:22px;border-right:1px solid var(--border2);}
.stat:last-child{border:none;}
.stat-ico{font-size:16px;}
.stat-v{font-size:16px;color:var(--green);font-weight:700;line-height:1;}
.stat-l{font-size:9.5px;color:var(--text3);letter-spacing:.4px;text-transform:uppercase;font-weight:500;margin-top:1px;}

/* ── READER ── */
#rdr{display:none;flex-direction:column;position:fixed;inset:0;background:var(--bg);z-index:100;}
#rdr.show{display:flex;}
.rtop{background:var(--surface);height:50px;display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid var(--border);flex-shrink:0;box-shadow:0 1px 6px rgba(78,154,106,.07);}
.back-btn{background:var(--green4);border:1px solid var(--green3);color:var(--green);padding:6px 14px;border-radius:14px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;transition:all .15s;}
.back-btn:hover{background:var(--green);color:#fff;}
.rtitle{flex:1;font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.raction{display:flex;gap:2px;}
.ibtn{background:none;border:none;color:var(--text3);cursor:pointer;padding:7px;border-radius:8px;transition:all .15s;line-height:1;}
.ibtn:hover{background:var(--green4);color:var(--green);}
.ibtn.on{color:var(--pink);background:var(--pink-pale);}
.ibtn svg{width:16px;height:16px;fill:currentColor;display:block;}
/* Layout */
.rbody{flex:1;display:flex;overflow:hidden;position:relative;}
/* Sidebar */
.rside{position:absolute;left:0;top:0;bottom:0;width:258px;background:var(--surface);border-right:1px solid var(--border2);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .28s ease;z-index:40;box-shadow:2px 0 16px rgba(0,0,0,.1);}
.rside.show{transform:translateX(0);}
.stabs{display:flex;border-bottom:1px solid var(--border2);}
.stab{flex:1;padding:10px 4px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:9.5px;font-family:inherit;transition:all .15s;letter-spacing:.7px;border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:700;text-transform:uppercase;}
.stab.on{color:var(--green);border-bottom-color:var(--green);}
.search-row{padding:9px 10px;border-bottom:1px solid var(--border2);flex-shrink:0;display:none;gap:6px;}
.search-row.show{display:flex;}
.sinput{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;}
.sinput:focus{border-color:var(--green);}
.sgo{background:var(--green);border:none;color:#fff;padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;}
.scontent{flex:1;overflow-y:auto;padding:8px;}
.titem{padding:7px 9px;border-radius:6px;cursor:pointer;font-size:12.5px;color:var(--text2);transition:all .15s;line-height:1.4;}
.titem:hover{background:var(--green4);color:var(--green);}
.bmitem{padding:9px;border-radius:7px;background:var(--surface2);margin-bottom:5px;cursor:pointer;border:1px solid var(--border2);transition:all .15s;}
.bmitem:hover{background:var(--green4);border-color:var(--green3);}
.bmpage{font-size:10.5px;color:var(--green);font-weight:700;}
.bmdate{font-size:11px;color:var(--text3);margin-top:1px;}
.bmdel{float:right;background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;transition:color .15s;}
.bmdel:hover{color:var(--pink);}
.empty{color:var(--text3);font-size:12px;padding:20px 6px;text-align:center;line-height:1.8;}
/* Reading area */
.rarea{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
/* rcontent: block scroll container */
.rcontent{flex:1;overflow:auto;padding:24px 16px;position:relative;}
.theme-light .rcontent{background:#FFFDF8;}
.theme-sepia .rcontent{background:#F5EDD8;}
.theme-dark .rcontent{background:#181C14;}
/* Click zones */
.czone{position:absolute;top:50%;transform:translateY(-50%);width:52px;height:64px;z-index:15;cursor:pointer;display:flex;align-items:center;opacity:0;transition:opacity .2s;}
.rarea:hover .czone{opacity:.55;}
.czone:hover{opacity:1!important;}
.czone.left{left:4px;justify-content:flex-start;}
.czone.right{right:4px;justify-content:flex-end;}
.carrow{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.93);border:1.5px solid var(--green3);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--green);box-shadow:0 2px 10px rgba(78,154,106,.2);transition:all .15s;pointer-events:none;}
.czone:hover .carrow{background:var(--green);color:#fff;box-shadow:0 3px 14px rgba(78,154,106,.4);}
/* Canvas */
.cwrap{display:table;margin:0 auto;}
.cwrap.dbl{display:flex;flex-direction:row;justify-content:center;gap:6px;align-items:flex-start;margin:0 auto;width:max-content;}
.cwrap.dbl canvas{max-width:none;}
.pdiv{width:2px;background:var(--border2);align-self:stretch;flex-shrink:0;}
canvas{display:block;box-shadow:0 3px 18px rgba(0,0,0,.12);border-radius:1px;}
#epub-area{width:100%;max-width:760px;}
#txt-area{display:none;width:100%;max-width:700px;margin:0 auto;}
/* Settings panel */
.spanel{position:absolute;top:0;right:0;height:100%;width:258px;background:var(--surface);border-left:1px solid var(--border2);padding:16px 14px;display:flex;flex-direction:column;gap:16px;transform:translateX(258px);transition:transform .28s ease;z-index:10;overflow-y:auto;}
.spanel.show{transform:translateX(0);}
.shd{font-size:10.5px;color:var(--green);letter-spacing:2px;text-transform:uppercase;padding-bottom:10px;border-bottom:1px solid var(--border2);font-weight:700;}
.sg label{display:block;font-size:9.5px;color:var(--text3);margin-bottom:7px;letter-spacing:.7px;text-transform:uppercase;font-weight:700;}
.theme-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.tbtn{padding:9px 3px;border-radius:7px;cursor:pointer;font-size:11px;border:2px solid transparent;transition:all .15s;font-family:inherit;font-weight:600;}
.tbtn.light{background:#FFFDF8;color:#3A2A18;border-color:var(--border);}
.tbtn.sepia{background:#F5EDD8;color:#5A3A18;border-color:#D8C8A0;}
.tbtn.dark{background:#181C14;color:#D0E8C0;border-color:#3A4030;}
.tbtn.on{border-color:var(--green)!important;box-shadow:0 0 0 2px var(--green3);}
.row3{display:flex;align-items:center;gap:8px;}
.smbtn{background:var(--bg);border:1px solid var(--border);color:var(--text);height:32px;min-width:32px;border-radius:7px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;font-family:inherit;font-weight:600;padding:0 8px;transition:all .15s;}
.smbtn:hover{background:var(--green4);border-color:var(--green3);color:var(--green);}
.smval{color:var(--text);font-size:13px;min-width:38px;text-align:center;font-weight:600;}
.fflist{display:flex;flex-direction:column;gap:4px;}
.ffbtn{padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:7px;cursor:pointer;color:var(--text2);text-align:left;transition:all .15s;font-size:12.5px;font-family:inherit;}
.ffbtn:hover{background:var(--green4);border-color:var(--green3);}
.ffbtn.on{border-color:var(--green);color:var(--green);background:var(--green4);font-weight:600;}
.lhrow{display:flex;gap:5px;}
.lhbtn{flex:1;padding:6px;background:var(--bg);border:1px solid var(--border);border-radius:7px;cursor:pointer;color:var(--text2);font-size:11px;transition:all .15s;text-align:center;font-family:inherit;font-weight:500;}
.lhbtn:hover{background:var(--green4);}
.lhbtn.on{border-color:var(--green);color:var(--green);background:var(--green4);}
.lyrow{display:flex;gap:5px;}
.lybtn{flex:1;padding:9px 4px;background:var(--bg);border:2px solid var(--border);border-radius:7px;cursor:pointer;color:var(--text2);font-size:10.5px;transition:all .15s;text-align:center;font-family:inherit;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;}
.lybtn:hover{background:var(--green4);}
.lybtn.on{border-color:var(--green);color:var(--green);background:var(--green4);}
.lyico{font-size:15px;}
.statinfo{font-size:12px;color:var(--text3);line-height:2.1;}
.statinfo strong{color:var(--green);}
/* Bottom bar */
.rbot{background:var(--surface);padding:9px 16px;border-top:1px solid var(--border2);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.nbtn{background:var(--green4);border:1px solid var(--green3);color:var(--green);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.nbtn:hover{background:var(--green);color:#fff;}
.nbtn:disabled{opacity:.28;cursor:default;background:var(--bg);}
.ptrack{flex:1;height:5px;background:var(--border2);border-radius:3px;cursor:pointer;}
.pfill{height:100%;background:linear-gradient(90deg,var(--green),var(--sky));border-radius:3px;transition:width .2s;}
.pinfo{font-size:12px;color:var(--text3);min-width:66px;text-align:center;font-weight:500;}
/* Loading */
.loverlay{position:absolute;inset:0;background:rgba(244,249,241,.88);display:none;align-items:center;justify-content:center;z-index:30;flex-direction:column;gap:12px;}
.loverlay.show{display:flex;}
.spin{width:34px;height:34px;border:3px solid var(--green3);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
/* Toast */
.toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--green);color:#fff;padding:8px 18px;border-radius:18px;font-size:12.5px;font-weight:600;opacity:0;transition:all .28s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* Modal */
.mbg{position:fixed;inset:0;background:rgba(42,56,40,.4);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;}
.mbg.show{display:flex;}
.mbox{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px;max-width:380px;width:90%;box-shadow:0 14px 40px rgba(78,154,106,.15);}
.mtitle{color:var(--green);font-size:16px;font-weight:700;margin-bottom:10px;}
.mbody{color:var(--text2);font-size:13px;line-height:1.7;margin-bottom:18px;}
.mbtns{display:flex;gap:8px;justify-content:flex-end;}
.mbtn{padding:8px 18px;border-radius:18px;cursor:pointer;font-size:13px;font-family:inherit;border:1px solid var(--border);color:var(--text2);background:var(--bg);font-weight:500;transition:all .15s;}
.mbtn:hover{background:var(--green4);}
.mbtn.pri{background:var(--green);color:#fff;border-color:var(--green);}
.mbtn.pri:hover{background:#3D8058;}
.minput{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;}
.minput:focus{border-color:var(--green);}
/* Context menu */
.ctx{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:6px 0;z-index:200;box-shadow:0 6px 20px rgba(78,154,106,.12);min-width:158px;display:none;}
.ctx.show{display:block;}
.citem{padding:8px 14px;font-size:13px;color:var(--text2);cursor:pointer;transition:background .15s;}
.citem:hover{background:var(--green4);color:var(--green);}
.csep{height:1px;background:var(--border2);margin:4px 0;}
/* Drop overlay */
.drop{position:fixed;inset:0;background:rgba(78,154,106,.1);backdrop-filter:blur(3px);z-index:50;display:none;align-items:center;justify-content:center;pointer-events:none;}
.drop.show{display:flex;}
.dropbox{background:var(--surface);border:3px dashed var(--green);border-radius:18px;padding:40px 56px;text-align:center;color:var(--green);}
/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--surface2);}
::-webkit-scrollbar-thumb{background:var(--green3);border-radius:3px;}
/* Spring blobs */
.blob{position:fixed;border-radius:50%;pointer-events:none;opacity:.05;z-index:0;}
.fsbtn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:6px 7px;border-radius:7px;transition:all .15s;flex-shrink:0;line-height:1;}
.fsbtn:hover{background:var(--green4);color:var(--green);}
input[type=file]{display:none;}
</style>
</head>
<body>
<div class="blob" style="width:340px;height:340px;background:var(--pink);top:-70px;right:-60px;"></div>
<div class="blob" style="width:220px;height:220px;background:var(--lav);bottom:30px;left:-50px;"></div>

<!-- LIBRARY -->
<div id="lib">
  <header class="hdr">
    <div class="hdr-left">
      <div class="logo">🌸</div>
      <div><div class="app-name">RAFIM</div><div class="app-sub">Dijital Kitaplığın</div></div>
    </div>
    <button class="add-btn" onclick="document.getElementById('fi').click()">＋ Kitap Ekle</button>
  </header>
  <div class="shelf-wrap">
    <div class="shelf-lbl">📚 Kitaplığım</div>
    <div class="shelf"><div class="books" id="books"></div></div>
  </div>
  <div class="stats" id="stats"></div>
</div>

<!-- READER -->
<div id="rdr">
  <div class="rtop">
    <button class="back-btn" id="back-btn">← Kütüphane</button>
    <div class="rtitle" id="rtitle">—</div>
    <div class="raction">
      <button class="ibtn" id="btn-side" title="İçindekiler">
        <svg viewBox="0 0 24 24"><path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/></svg>
      </button>
      <button class="ibtn" id="btn-bm" title="İşaret ekle">
        <svg viewBox="0 0 24 24"><path d="M17 3H7a2 2 0 00-2 2v16l7-3 7 3V5a2 2 0 00-2-2z"/></svg>
      </button>
      <button class="ibtn" id="btn-set" title="Ayarlar">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.4-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.11-.21.06-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      </button>
    </div>
  </div>
  <div class="rbody">
    <!-- Sidebar -->
    <div class="rside" id="rside">
      <div class="stabs">
        <button class="stab on" data-tab="toc">İçindekiler</button>
        <button class="stab" data-tab="bm">İşaretler</button>
        <button class="stab" data-tab="srch">Ara</button>
      </div>
      <div class="search-row" id="srow">
        <input class="sinput" id="sinput" placeholder="Kitapta ara...">
        <button class="sgo" id="sgo">↵</button>
      </div>
      <div class="scontent" id="scontent"></div>
    </div>
    <!-- Reading area -->
    <div class="rarea theme-light" id="rarea">
      <div class="czone left" id="cz-left"><div class="carrow">‹</div></div>
      <div class="czone right" id="cz-right"><div class="carrow">›</div></div>
      <div class="rcontent" id="rcontent">

<script>
'use strict';
// ── PDF.js worker ──
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const CMAP_URL  = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/';
const CMAP_PACKED = true;

// ── INDEXED DB & LOCAL STORAGE FOR PERSISTENCE ──
const DB_NAME = 'RafimDB';
const idb = {
  db: null,
  async init() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('books')) {
          db.createObjectStore('books', { keyPath: 'id' });
        }
      };
      req.onsuccess = e => { this.db = e.target.result; resolve(); };
      req.onerror = () => reject('DB Error');
    });
  },
  async getBooks() {
    return new Promise(resolve => {
      if(!this.db) return resolve([]);
      const tx = this.db.transaction('books', 'readonly');
      const req = tx.objectStore('books').getAll();
      req.onsuccess = e => resolve(e.target.result || []);
      req.onerror = () => resolve([]);
    });
  },
  async saveBook(book) {
    if(book.type === 'demo') return; // Demo kitapları DB'ye yazma
    return new Promise(resolve => {
      if(!this.db) return resolve();
      const tx = this.db.transaction('books', 'readwrite');
      tx.objectStore('books').put(book);
      tx.oncomplete = resolve;
    });
  },
  async deleteBook(id) {
    return new Promise(resolve => {
      if(!this.db) return resolve();
      const tx = this.db.transaction('books', 'readwrite');
      tx.objectStore('books').delete(id);
      tx.oncomplete = resolve;
    });
  }
};

function saveLocal() {
  localStorage.setItem('rafim_cfg', JSON.stringify(ST.cfg));
  localStorage.setItem('rafim_bmarks', JSON.stringify(ST.bmarks));
}

// ── STATE ──
const ST = {
  books: [],
  cur: null,
  pdfDoc: null,
  page: 1, pages: 1,
  epubBook: null, epubRend: null,
  cfg: { theme:'light', fs:18, ff:"'Inter',sans-serif", lh:1.85, zoom:1.0, layout:'single' },
  bmarks: {},
  toc: [],
  sideOpen: false, setOpen: false, activeTab: 'toc',
  t0: null, pagesRead: 0,
  ctxBook: null, srResults: [],
};

// ── DEMO BOOKS ──
const PALETTE = ['#D4507A','#4E9A6A','#5080C8','#C86A28','#7A6ACC','#3A8A88','#C84060','#507A30'];
[{t:'Küçük Prens',a:'A. de Saint-Exupéry',c:'#9B50A0',p:65},
 {t:'Şeker Portakalı',a:'J.M. de Vasconcelos',c:'#3A8060',p:32},
 {t:'Kürk Mantolu Madonna',a:'Sabahattin Ali',c:'#2858A8',p:100},
 {t:'İnce Memed',a:'Yaşar Kemal',c:'#B83A30',p:0},
 {t:'Tutunamayanlar',a:'Oğuz Atay',c:'#6048A0',p:48},
 {t:'Sinekli Bakkal',a:'Halide E. Adıvar',c:'#287858',p:18},
 {t:'Suç ve Ceza',a:'F. Dostoyevski',c:'#384890',p:0},
 {t:'Savaş ve Barış',a:'Lev Tolstoy',c:'#A84028',p:7}
].forEach((d,i)=>ST.books.push({id:'d'+i,title:d.t,author:d.a,color:d.c,progress:d.p,type:'demo',coverUrl:null}));

// ── UTILS ──
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dk(h,a){try{return`rgb(${Math.max(0,parseInt(h.slice(1,3),16)-a)},${Math.max(0,parseInt(h.slice(3,5),16)-a)},${Math.max(0,parseInt(h.slice(5,7),16)-a)})`;}catch{return h;}}
let toastT;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2600);}
function showLoad(v){document.getElementById('loverlay').classList.toggle('show',v);}

// ── LIBRARY RENDER ──
function renderLib(){
  const el=document.getElementById('books');el.innerHTML='';
  ST.books.forEach(b=>{
    const d=document.createElement('div');d.className='bk';d.dataset.id=b.id;
    d.addEventListener('click',()=>openBook(b));
    d.addEventListener('contextmenu',e=>showCtx(e,b));
    const badge=b.progress>=100?'<span class="bk-bdg bdg-done">BİTTİ</span>':b.progress===0?'<span class="bk-bdg bdg-new">YENİ</span>':'';
    const coverHtml=b.coverUrl
      ?`<img src="${esc(b.coverUrl)}" alt="">`
      :`<div class="bk-fallback" style="background:linear-gradient(148deg,${b.color},${dk(b.color,55)})">
          <div class="bk-spine"></div>
          <div class="bk-ttl">${esc(b.title)}</div>
          <div class="bk-auth">${esc(b.author)}</div>
        </div>`;
    d.innerHTML=`<div class="bk-cover">${coverHtml}${badge}
        <div class="bk-prog"><div class="bk-prog-fill" style="width:${b.progress||0}%"></div></div>
      </div>
      <div class="bk-meta">
        <div class="bk-name" title="${esc(b.title)}">${esc(b.title)}</div>
        <div class="bk-pct">${b.progress||0}%</div>
      </div>`;
    el.appendChild(d);
  });
  const add=document.createElement('div');add.className='add-card';
  add.innerHTML='<div class="add-card-icon">🌿</div><div class="add-card-txt">Kitap Ekle<br><small>PDF · EPUB · TXT</small></div>';
  add.addEventListener('click',()=>document.getElementById('fi').click());
  el.appendChild(add);
  // Stats
  const s=document.getElementById('stats');
  const done=ST.books.filter(b=>b.progress>=100).length;
  const rdg=ST.books.filter(b=>b.progress>0&&b.progress<100).length;
  const unr=ST.books.filter(b=>!b.progress).length;
  s.innerHTML=`<div class="stat"><div class="stat-ico">📖</div><div><div class="stat-v">${ST.books.length}</div><div class="stat-l">Toplam</div></div></div>
    <div class="stat"><div class="stat-ico">✅</div><div><div class="stat-v">${done}</div><div class="stat-l">Bitti</div></div></div>
    <div class="stat"><div class="stat-ico">🔖</div><div><div class="stat-v">${rdg}</div><div class="stat-l">Okunuyor</div></div></div>
    <div class="stat"><div class="stat-ico">🌱</div><div><div class="stat-v">${unr}</div><div class="stat-l">Okunmadı</div></div></div>`;
}

// ── FILE UPLOAD ──
document.getElementById('fi').addEventListener('change',function(){[...this.files].forEach(addFile);this.value='';});
let dragN=0;
document.addEventListener('dragenter',()=>{if(document.getElementById('lib').classList.contains('hide'))return;dragN++;document.getElementById('drop').classList.add('show');});
document.addEventListener('dragleave',()=>{dragN--;if(dragN<=0){dragN=0;document.getElementById('drop').classList.remove('show');}});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();dragN=0;document.getElementById('drop').classList.remove('show');
  if(document.getElementById('lib').classList.contains('hide'))return;
  [...e.dataTransfer.files].forEach(addFile);
});

async function addFile(file){
  const ext=file.name.split('.').pop().toLowerCase();
  if(!['pdf','epub','txt'].includes(ext)){toast('Desteklenmeyen format: .'+ext);return;}
  const color=PALETTE[ST.books.length%PALETTE.length];
  const book={id:'b'+Date.now()+Math.random().toString(36).slice(2),title:file.name.replace(/\.[^.]+$/,''),author:'',color,progress:0,type:ext,file,coverUrl:null};
  ST.books.push(book);
  renderLib();
  toast(`"${book.title}" eklendi ✓`);
  
  await idb.saveBook(book); // DB ye kaydet
  
  if(ext==='epub') extractEpubMeta(book);
  else if(ext==='pdf') extractPdfCover(book);
}

async function extractEpubMeta(book){
  try{
    const url=URL.createObjectURL(book.file);
    const eb=ePub(url);
    const [meta,coverUrl]=await Promise.all([
      eb.loaded.metadata.catch(()=>null),
      eb.coverUrl().catch(()=>null)
    ]);
    if(meta?.title&&meta.title.length>1)book.title=meta.title;
    if(meta?.creator)book.author=meta.creator;
    if(coverUrl)book.coverUrl=coverUrl;
    eb.destroy();
    renderLib();
    idb.saveBook(book); // Kapak bulunduğunda güncelle
  }catch(e){/* silent */}
}
async function extractPdfCover(book){
  try{
    const buf=await book.file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:new Uint8Array(buf),cMapUrl:CMAP_URL,cMapPacked:CMAP_PACKED}).promise;
    const pg=await pdf.getPage(1);
    const vp=pg.getViewport({scale:0.4});
    const cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;
    await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
    book.coverUrl=cv.toDataURL('image/jpeg',.82);
    pdf.destroy();
    renderLib();
    idb.saveBook(book); // Kapak bulunduğunda güncelle
  }catch(e){/* silent */}
}

// ── OPEN BOOK ──
function openBook(book){
  if(book.type==='demo'){
    showModal('Örnek Kitap',`"<strong>${esc(book.title)}</strong>" bir demo göstergesidir.<br><br>Gerçek kitap eklemek için <strong>PDF, EPUB veya TXT</strong> dosyası yükleyin.`,[{label:'Tamam',pri:true,fn:closeModal}]);
    return;
  }
  ST.cur=book;
  // Eğer kitabın daha önce okunmuş sayfasına dönülecekse
  ST.page = Math.max(1, Math.round((book.progress / 100) * ST.pages) || 1); 
  ST.pages=1;ST.t0=Date.now();ST.pagesRead=0;ST.toc=[];ST.srResults=[];
  
  document.getElementById('rtitle').textContent=book.title;
  document.getElementById('lib').classList.add('hide');
  document.getElementById('rdr').classList.add('show');
  
  document.getElementById('cwrap').innerHTML='';
  document.getElementById('cwrap').style.display='';
  document.getElementById('epub-area').innerHTML='';
  document.getElementById('epub-area').style.display='none';
  document.getElementById('txt-area').textContent='';
  document.getElementById('txt-area').style.display='none';
  
  applyTheme(ST.cfg.theme);
  document.getElementById('zoom-sg').style.display=book.type==='pdf'?'':'none';
  document.getElementById('layout-sg').style.display=book.type==='pdf'?'':'none';
  
  if(book.type==='pdf') loadPDF(book);
  else if(book.type==='epub') loadEPUB(book);
  else loadTXT(book);
}

function closeReader(){
  if(ST.cur){
    ST.cur.progress = Math.min(100, Math.round((ST.page/Math.max(1,ST.pages))*100));
    idb.saveBook(ST.cur); // İlerlemeyi kaydet
    renderLib();
  }
  if(ST.epubBook){try{ST.epubBook.destroy();}catch(e){}ST.epubBook=null;ST.epubRend=null;}
  ST.pdfDoc=null;ST.cur=null;
  document.getElementById('rdr').classList.remove('show');
  document.getElementById('lib').classList.remove('hide');
  closeSide();closeSet();
}

// ── PDF ──
async function loadPDF(book){
  showLoad(true);
  try{
    const buf=await book.file.arrayBuffer();
    ST.pdfDoc=await pdfjsLib.getDocument({data:new Uint8Array(buf),cMapUrl:CMAP_URL,cMapPacked:CMAP_PACKED}).promise;
    ST.pages=ST.pdfDoc.numPages;
    // Eğer ilerleme varsa kaldığı sayfayı bul
    ST.page = Math.max(1, Math.round((book.progress / 100) * ST.pages) || 1);
    const ol=await ST.pdfDoc.getOutline().catch(()=>null);
    ST.toc=ol?flatOl(ol):[];
    await renderPDF(ST.page);updNav();
    if(ST.sideOpen)renderTab();
  }catch(e){toast('PDF yüklenemedi: '+(e.message||e));closeReader();}
  finally{showLoad(false);}
}
function flatOl(ol,d=0){const r=[];(ol||[]).forEach(it=>{r.push({title:it.title,dest:it.dest,depth:d});if(it.items?.length)r.push(...flatOl(it.items,d+1));});return r;}

async function renderPDF(n){
  if(!ST.pdfDoc)return;
  const wrap=document.getElementById('cwrap');
  const dbl=ST.cfg.layout==='double';
  wrap.className='cwrap'+(dbl?' dbl':'');
  wrap.innerHTML='';
  async function onePage(num){
    if(num<1||num>ST.pdfDoc.numPages)return null;
    const pg=await ST.pdfDoc.getPage(num);
    const sc=getPdfScale(dbl);
    const vp=pg.getViewport({scale:sc});
    const cv=document.createElement('canvas');cv.width=Math.round(vp.width);cv.height=Math.round(vp.height);
    await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
    return cv;
  }
  if(dbl){
    const L=n%2===0?n-1:n;const R=L+1;
    const [cvL,cvR]=await Promise.all([onePage(L),onePage(R)]);
    if(cvL)wrap.appendChild(cvL);
    if(cvL&&cvR){const d=document.createElement('div');d.className='pdiv';wrap.appendChild(d);}
    if(cvR)wrap.appendChild(cvR);
    if(ST.page!==L){ST.page=L;updNav();}
  }else{
    const cv=await onePage(n);if(cv)wrap.appendChild(cv);
  }
  document.getElementById('rcontent').scrollTop=0;
}
function getPdfScale(dbl){
  const rc=document.getElementById('rcontent');
  const w=rc.clientWidth-32;
  return dbl?((w/2-8)/595)*ST.cfg.zoom:(w/595)*ST.cfg.zoom;
}

// ── EPUB ──
async function loadEPUB(book){
  showLoad(true);
  try{
    document.getElementById('cwrap').style.display='none';
    const ea=document.getElementById('epub-area');
    const rc=document.getElementById('rcontent');
    const W=Math.min(rc.clientWidth-32,760);
    const H=Math.max(window.innerHeight-180,500);
    ea.style.cssText=`display:block;width:${W}px;height:${H}px;margin:0 auto;`;
    ea.innerHTML='';
    const blobUrl=URL.createObjectURL(book.file);
    ST.epubBook=ePub(blobUrl);
    ST.epubRend=ST.epubBook.renderTo(ea,{width:W,height:H,spread:'none',flow:'paginated'});
    
    // Eğer ilerleme varsa oraya git
    let targetCfi = undefined;
    
    await ST.epubRend.display(targetCfi);
    ST.epubBook.loaded.metadata.then(m=>{
      if(m?.title&&m.title.length>1){book.title=m.title;document.getElementById('rtitle').textContent=m.title;}
      if(m?.creator)book.author=m.creator;
      renderLib();
    }).catch(()=>{});
    ST.epubBook.loaded.navigation.then(nav=>{
      ST.toc=(nav?.toc||[]).flatMap(t=>[{title:t.label?.trim()||'—',href:t.href,depth:0},...(t.subitems||[]).map(s=>({title:s.label?.trim()||'—',href:s.href,depth:1}))]);
      if(ST.sideOpen)renderTab();
    }).catch(()=>{});
    ST.epubRend.on('relocated',loc=>{
      if(ST.epubBook.locations?.total&&loc?.start?.cfi){
        const idx=ST.epubBook.locations.locationFromCfi(loc.start.cfi);
        if(idx>=0){ST.page=idx+1;updNav();updBmBtn();}
      }
    });
    ST.epubBook.locations.generate(1200).then(()=>{
      ST.pages=ST.epubBook.locations.total||100;
      if (book.progress > 0 && book.progress <= 100) {
        let p = Math.max(1, Math.round((book.progress / 100) * ST.pages));
        let cfi = ST.epubBook.locations.cfiFromPercentage(book.progress/100);
        if(cfi) ST.epubRend.display(cfi);
      }
      updNav();
    }).catch(()=>{ST.pages=100;updNav();});
    ST.pages=100;ST.page=1;updNav();
  }catch(e){toast('EPUB yüklenemedi: '+(e.message||e));closeReader();}
  finally{showLoad(false);}
}

// ── TXT ──
async function loadTXT(book){
  showLoad(true);
  try{
    document.getElementById('cwrap').style.display='none';
    const ta=document.getElementById('txt-area');ta.style.display='block';
    const text=await book.file.text();
    book._pages=[];for(let i=0;i<text.length;i+=3000)book._pages.push(text.slice(i,i+3000));
    if(!book._pages.length)book._pages=['(Boş dosya)'];
    ST.pages=book._pages.length;
    ST.page = Math.max(1, Math.round((book.progress / 100) * ST.pages) || 1);
    ST.toc=book._pages.map((_,i)=>({title:'Bölüm '+(i+1),depth:0,page:i+1}));
    renderTXT(ST.page);updNav();if(ST.sideOpen)renderTab();
  }catch(e){toast('Dosya okunamadı.');closeReader();}
  finally{showLoad(false);}
}
function renderTXT(n){
  const bk=ST.cur;if(!bk?._pages)return;
  const ta=document.getElementById('txt-area');
  const{theme,fs,ff,lh}=ST.cfg;
  const clr=theme==='dark'?'#D0E8C0':theme==='sepia'?'#5A3A18':'#2A3828';
  ta.style.cssText=`display:block;width:100%;max-width:700px;margin:0 auto;font-family:${ff};font-size:${fs}px;line-height:${lh};color:${clr};white-space:pre-wrap;padding:0 8px;`;
  ta.textContent=bk._pages[n-1]||'';
  document.getElementById('rcontent').scrollTop=0;
}

// ── NAVIGATION ──
function pageStep(){return ST.cur?.type==='pdf'&&ST.cfg.layout==='double'?2:1;}
async function prevPage(){
  if(ST.page<=1)return;
  if(ST.cur?.type==='epub'){await ST.epubRend?.prev();ST.pagesRead++;return;}
  ST.page=Math.max(1,ST.page-pageStep());ST.pagesRead++;
  await goPage();updNav();updBmBtn();
}
async function nextPage(){
  if(ST.page>=ST.pages)return;
  if(ST.cur?.type==='epub'){await ST.epubRend?.next();ST.pagesRead++;return;}
  ST.page=Math.min(ST.pages,ST.page+pageStep());ST.pagesRead++;
  await goPage();updNav();updBmBtn();
}
async function goPage(){
  const t=ST.cur?.type;
  if(t==='pdf')await renderPDF(ST.page);
  else if(t==='txt')renderTXT(ST.page);
  if(ST.setOpen)updStats();
}
function updNav(){
  document.getElementById('pinfo').textContent=`${ST.page} / ${ST.pages}`;
  const pct=ST.pages>1?(ST.page-1)/(ST.pages-1)*100:0;
  document.getElementById('pfill').style.width=Math.round(pct)+'%';
  document.getElementById('prev-btn').disabled=ST.page<=1;
  document.getElementById('next-btn').disabled=ST.page>=ST.pages;
}

// ── BOOKMARKS ──
function toggleBm(){
  const id=ST.cur?.id;if(!id)return;
  if(!ST.bmarks[id])ST.bmarks[id]=[];
  const idx=ST.bmarks[id].findIndex(b=>b.page===ST.page);
  if(idx>=0){ST.bmarks[id].splice(idx,1);toast('İşaret kaldırıldı');}
  else{ST.bmarks[id].push({page:ST.page,date:new Date().toLocaleDateString('tr-TR')});toast('Sayfa işaretlendi 🔖');}
  saveLocal();
  updBmBtn();if(ST.sideOpen&&ST.activeTab==='bm')renderTab();
}
function updBmBtn(){
  const id=ST.cur?.id;
  document.getElementById('btn-bm').classList.toggle('on',!!(id&&(ST.bmarks[id]||[]).some(b=>b.page===ST.page)));
}
async function jumpBm(page){ST.page=page;await goPage();updNav();updBmBtn();}
function delBm(id,page,e){
  e.stopPropagation();
  ST.bmarks[id]=(ST.bmarks[id]||[]).filter(b=>b.page!==page);
  saveLocal();
  updBmBtn();renderTab();
}

// ── SIDEBAR ──
function toggleSide(){if(ST.sideOpen)closeSide();else openSide();}
function openSide(){ST.sideOpen=true;document.getElementById('rside').classList.add('show');document.getElementById('btn-side').classList.add('on');renderTab();}
function closeSide(){ST.sideOpen=false;document.getElementById('rside').classList.remove('show');document.getElementById('btn-side').classList.remove('on');}
function renderTab(){
  const c=document.getElementById('scontent');
  if(ST.activeTab==='toc'){
    if(!ST.toc.length){c.innerHTML='<div class="empty">📋 İçindekiler bulunamadı.</div>';return;}
    c.innerHTML=ST.toc.map((it,i)=>`<div class="titem" style="padding-left:${8+it.depth*14}px" data-i="${i}">${esc(it.title)}</div>`).join('');
    c.querySelectorAll('.titem').forEach(el=>el.addEventListener('click',()=>goTOC(+el.dataset.i)));
  }else if(ST.activeTab==='bm'){
    const id=ST.cur?.id;const bms=(id&&ST.bmarks[id])||[];
    if(!bms.length){c.innerHTML='<div class="empty">🔖 Henüz işaret yok.<br><br>★ butona bas.</div>';return;}
    c.innerHTML='';bms.forEach(b=>{
      const d=document.createElement('div');d.className='bmitem';
      d.innerHTML=`<button class="bmdel">✕</button><div class="bmpage">SAYFA ${b.page}</div><div class="bmdate">${b.date}</div>`;
      d.addEventListener('click',()=>jumpBm(b.page));
      d.querySelector('.bmdel').addEventListener('click',e=>delBm(id,b.page,e));
      c.appendChild(d);
    });
  }else{
    if(!ST.srResults.length){c.innerHTML='<div class="empty">🔍 Aramak için metin gir.</div>';return;}
    c.innerHTML=`<div style="font-size:10px;color:var(--green);padding:4px 8px 8px;font-weight:700">${ST.srResults.length} sonuç</div>`;
    ST.srResults.forEach(r=>{
      const d=document.createElement('div');d.className='bmitem';
      d.innerHTML=`<div class="bmpage">SAYFA ${r.page}</div><div class="bmdate" style="line-height:1.4;font-size:11px">${esc(r.snip)}</div>`;
      d.addEventListener('click',()=>jumpBm(r.page));
      c.appendChild(d);
    });
  }
}
async function goTOC(i){
  const it=ST.toc[i];if(!it)return;
  if(ST.cur?.type==='pdf'&&it.dest){
    try{const dest=await ST.pdfDoc.getDestination(it.dest);if(dest){const ref=await ST.pdfDoc.getPageIndex(dest[0]);ST.page=ref+1;await renderPDF(ST.page);updNav();}}catch(e){}
  }else if(ST.cur?.type==='epub'&&ST.epubRend)ST.epubRend.display(it.href);
  else if(ST.cur?.type==='txt'&&it.page){ST.page=it.page;renderTXT(ST.page);updNav();}
}

// ── SEARCH ──
async function doSearch(){
  const q=document.getElementById('sinput').value.trim();
  if(!q)return;
  if(ST.cur?.type!=='pdf'){toast('Arama yalnızca PDF için');return;}
  toast('Aranıyor…');ST.srResults=[];
  for(let i=1;i<=ST.pdfDoc.numPages&&ST.srResults.length<60;i++){
    const pg=await ST.pdfDoc.getPage(i);
    const ct=await pg.getTextContent();
    const tx=ct.items.map(x=>x.str).join(' ');
    if(tx.toLowerCase().includes(q.toLowerCase())){
      const idx=tx.toLowerCase().indexOf(q.toLowerCase());
      ST.srResults.push({page:i,snip:'…'+tx.slice(Math.max(0,idx-30),idx+q.length+30).trim()+'…'});
    }
  }
  toast(ST.srResults.length?ST.srResults.length+' sayfa bulundu':'Sonuç bulunamadı');
  renderTab();
}

// ── SETTINGS ──
function toggleSet(){if(ST.setOpen)closeSet();else openSet();}
function openSet(){ST.setOpen=true;document.getElementById('spanel').classList.add('show');document.getElementById('btn-set').classList.add('on');updStats();}
function closeSet(){ST.setOpen=false;document.getElementById('spanel').classList.remove('show');document.getElementById('btn-set').classList.remove('on');}

function applyTheme(t){
  const ra=document.getElementById('rarea');
  ra.className='rarea theme-'+t;
  document.querySelectorAll('[data-theme]').forEach(b=>b.classList.toggle('on',b.dataset.theme===t));
  if(ST.cur?.type==='txt')renderTXT(ST.page);
}
function updStats(){
  if(!ST.t0){document.getElementById('statinfo').innerHTML='—';return;}
  const mins=Math.round((Date.now()-ST.t0)/60000);
  const pct=Math.round((ST.page/ST.pages)*100);
  document.getElementById('statinfo').innerHTML=`<div>⏱ Süre: <strong>${mins} dk</strong></div><div>📄 Okunan: <strong>${ST.pagesRead}</strong></div><div>📊 İlerleme: <strong>${pct}%</strong></div><div>🌿 Kalan: <strong>${ST.pages-ST.page} sayfa</strong></div>`;
}

// ── CONTEXT MENU ──
function showCtx(e,book){e.preventDefault();ST.ctxBook=book;const m=document.getElementById('ctx');m.classList.add('show');m.style.left=Math.min(e.clientX,window.innerWidth-168)+'px';m.style.top=Math.min(e.clientY,window.innerHeight-120)+'px';}
document.addEventListener('click',()=>document.getElementById('ctx').classList.remove('show'));

// ── MODAL ──
function showModal(title,body,btns){
  document.getElementById('mtitle').textContent=title;
  document.getElementById('mbody').innerHTML=body;
  const bb=document.getElementById('mbtns');bb.innerHTML='';
  btns.forEach(b=>{const el=document.createElement('button');el.className='mbtn'+(b.pri?' pri':'');el.textContent=b.label;el.addEventListener('click',b.fn);bb.appendChild(el);});
  document.getElementById('mbg').classList.add('show');
}
function closeModal(){document.getElementById('mbg').classList.remove('show');}
document.getElementById('mbg').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ── WIRE UP EVENTS ──
document.getElementById('back-btn').addEventListener('click',closeReader);
document.getElementById('prev-btn').addEventListener('click',prevPage);
document.getElementById('next-btn').addEventListener('click',nextPage);
document.getElementById('btn-side').addEventListener('click',toggleSide);
document.getElementById('btn-bm').addEventListener('click',toggleBm);
document.getElementById('btn-set').addEventListener('click',toggleSet);
document.getElementById('sgo').addEventListener('click',doSearch);
document.getElementById('sinput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
document.getElementById('cz-left').addEventListener('click',prevPage);
document.getElementById('cz-right').addEventListener('click',nextPage);
document.getElementById('ptrack').addEventListener('click',e=>{
  if(ST.cur?.type==='epub')return;
  const pct=Math.max(0,Math.min(1,e.offsetX/e.currentTarget.offsetWidth));
  ST.page=Math.max(1,Math.min(ST.pages,Math.round(pct*(ST.pages-1))+1));
  goPage();updNav();updBmBtn();
});

// Theme buttons
document.querySelectorAll('[data-theme]').forEach(b=>b.addEventListener('click',()=>{
  ST.cfg.theme=b.dataset.theme;applyTheme(ST.cfg.theme);saveLocal();
}));

// Font size
document.getElementById('fz-dn').addEventListener('click',()=>{
  ST.cfg.fs=Math.max(12,ST.cfg.fs-2);document.getElementById('fz-val').textContent=ST.cfg.fs;
  if(ST.cur?.type==='txt')renderTXT(ST.page);
  saveLocal();
});
document.getElementById('fz-up').addEventListener('click',()=>{
  ST.cfg.fs=Math.min(34,ST.cfg.fs+2);document.getElementById('fz-val').textContent=ST.cfg.fs;
  if(ST.cur?.type==='txt')renderTXT(ST.page);
  saveLocal();
});

// Zoom
document.getElementById('zm-dn').addEventListener('click',()=>{
  ST.cfg.zoom=Math.max(.3,+(ST.cfg.zoom-.1).toFixed(2));
  document.getElementById('zm-pct').textContent=Math.round(ST.cfg.zoom*100)+'%';
  if(ST.cur?.type==='pdf')renderPDF(ST.page);
  saveLocal();
});
document.getElementById('zm-up').addEventListener('click',()=>{
  ST.cfg.zoom=Math.min(3,+(ST.cfg.zoom+.1).toFixed(2));
  document.getElementById('zm-pct').textContent=Math.round(ST.cfg.zoom*100)+'%';
  if(ST.cur?.type==='pdf')renderPDF(ST.page);
  saveLocal();
});
document.getElementById('zm-pct').addEventListener('click',()=>{
  ST.cfg.zoom=1.0;document.getElementById('zm-pct').textContent='100%';
  if(ST.cur?.type==='pdf')renderPDF(ST.page);
  saveLocal();
});

// Layout
document.querySelectorAll('[data-layout]').forEach(b=>b.addEventListener('click',()=>{
  ST.cfg.layout=b.dataset.layout;
  document.querySelectorAll('[data-layout]').forEach(x=>x.classList.toggle('on',x.dataset.layout===ST.cfg.layout));
  if(ST.cur?.type==='pdf')renderPDF(ST.page);
  saveLocal();
}));

// Font family
document.querySelectorAll('[data-ff]').forEach(b=>b.addEventListener('click',()=>{
  ST.cfg.ff=b.dataset.ff;
  document.querySelectorAll('[data-ff]').forEach(x=>x.classList.toggle('on',x===b));
  if(ST.cur?.type==='txt')renderTXT(ST.page);
  saveLocal();
}));

// Line height
document.querySelectorAll('[data-lh]').forEach(b=>b.addEventListener('click',()=>{
  ST.cfg.lh=parseFloat(b.dataset.lh);
  document.querySelectorAll('[data-lh]').forEach(x=>x.classList.toggle('on',x===b));
  if(ST.cur?.type==='txt')renderTXT(ST.page);
  saveLocal();
}));

// Sidebar tabs
document.querySelectorAll('.stab').forEach(b=>b.addEventListener('click',()=>{
  ST.activeTab=b.dataset.tab;
  document.querySelectorAll('.stab').forEach(x=>x.classList.toggle('on',x===b));
  document.getElementById('srow').classList.toggle('show',ST.activeTab==='srch');
  renderTab();
}));

// Context menu actions
document.getElementById('ctx-open').addEventListener('click',()=>{if(ST.ctxBook)openBook(ST.ctxBook);});
document.getElementById('ctx-rename').addEventListener('click',()=>{
  const bk=ST.ctxBook;if(!bk)return;
  showModal('Adını Değiştir',`<input id="ren" class="minput" value="${esc(bk.title)}">`,[
    {label:'İptal',fn:closeModal},
    {label:'Kaydet',pri:true,fn:()=>{
      const v=document.getElementById('ren').value.trim();
      if(v){
        bk.title=v;
        renderLib();
        toast('İsim güncellendi ✓');
        idb.saveBook(bk); // isim değişikliğini kaydet
      }
      closeModal();
    }}
  ]);
  setTimeout(()=>document.getElementById('ren')?.focus(),80);
});
document.getElementById('ctx-remove').addEventListener('click',()=>{
  const bk=ST.ctxBook;if(!bk)return;
  showModal('Kitabı Kaldır',`"<strong>${esc(bk.title)}</strong>" kütüphaneden kaldırılsın mı?`,[
    {label:'Hayır',fn:closeModal},
    {label:'Kaldır',pri:true,fn:()=>{
      ST.books=ST.books.filter(b=>b.id!==bk.id);
      idb.deleteBook(bk.id); // veritabanından kaldır
      renderLib();
      toast('Kaldırıldı');
      closeModal();
    }}
  ]);
});

document.getElementById('fs-btn').addEventListener('click',toggleFS);

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(document.activeElement?.tagName==='INPUT')return;
  if(!ST.cur)return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();nextPage();}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();prevPage();}
  if(e.key==='Escape'){if(ST.setOpen)closeSet();else if(ST.sideOpen)closeSide();}
  if(e.key==='b'||e.key==='B')toggleBm();
  if(e.key==='f'||e.key==='F')toggleFS();
});

function toggleFS(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen?.().catch(()=>{});
  else document.exitFullscreen?.();
}

function syncSettingsUI() {
  document.getElementById('fz-val').textContent = ST.cfg.fs;
  document.getElementById('zm-pct').textContent = Math.round(ST.cfg.zoom * 100) + '%';
  document.querySelectorAll('[data-layout]').forEach(x => x.classList.toggle('on', x.dataset.layout === ST.cfg.layout));
  document.querySelectorAll('[data-ff]').forEach(x => x.classList.toggle('on', x.dataset.ff === ST.cfg.ff));
  document.querySelectorAll('[data-lh]').forEach(x => x.classList.toggle('on', parseFloat(x.dataset.lh) === ST.cfg.lh));
  document.querySelectorAll('[data-theme]').forEach(b => b.classList.toggle('on', b.dataset.theme === ST.cfg.theme));
}

// ── INIT BOOT ──
async function boot() {
  // Config & Bookmark yükle
  try {
    const savedCfg = localStorage.getItem('rafim_cfg');
    if(savedCfg) ST.cfg = {...ST.cfg, ...JSON.parse(savedCfg)};
    const savedBm = localStorage.getItem('rafim_bmarks');
    if(savedBm) ST.bmarks = JSON.parse(savedBm);
  } catch(e) {}
  
  syncSettingsUI();

  // Veritabanından kitapları çek
  try {
    await idb.init();
    const savedBooks = await idb.getBooks();
    if (savedBooks && savedBooks.length > 0) {
      ST.books.push(...savedBooks);
    }
  } catch(e) {
    console.warn('Veritabanı başlatılamadı', e);
  }
  
  renderLib();
}

boot();
</script>
</body>
</html>
