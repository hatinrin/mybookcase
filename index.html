<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Like My Book Case</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#F4F9F1;--surface:#FFFFFF;--surface2:#F0F7EC;
  --green:#4E9A6A; --green2:#7BBF90; --green3:#C2E5CE; --green4:#EAF7EE;
  --accent1:#E05C85; --accent2:#C0406A;
  --sky:#60AADC;--lav:#9B7EC8;
  --text:#2A3828;--text2:#4A6048;--text3:#7A9070;
  --border:#CAE0BE;--border2:#DDEEDD;
  --shelf:#D0E5C2;--shelf-edge:#88A878;--shelf-top:#A8C898;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;transition:background .4s ease, color .4s ease;overflow-x:hidden;}

/* ── TOP TOAST ── */
.top-toast{position:fixed;top:0;left:50%;transform:translate(-50%,-100%);background:var(--surface);color:var(--green);border:2px solid var(--green);padding:10px 28px;border-radius:0 0 16px 16px;font-weight:700;font-size:14px;box-shadow:0 6px 20px rgba(0,0,0,.15);z-index:2000;transition:all .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
.top-toast.show{transform:translate(-50%,0);}

/* ── LIBRARY ── */
#lib{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;}
#lib.hide{display:none;}
.hdr{background:var(--surface);padding:14px 36px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:50;transition:border-color .4s;}
.hdr-left{display:flex;align-items:center;gap:12px;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.logo{font-size:28px;}
.app-name{font-size:22px;color:var(--green);font-weight:800;letter-spacing:1px;text-transform:uppercase;transition:color .4s;}
.app-sub{font-size:11px;color:var(--accent1);letter-spacing:1.5px;font-weight:500;margin-top:1px;transition:color .4s;}
.add-btn{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;border:none;padding:9px 20px;border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 3px 10px rgba(0,0,0,.15);transition:all .4s;}
.add-btn:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.25);}
.app-set-btn{background:var(--bg);border:1px solid var(--border);color:var(--text2);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .4s;}
.app-set-btn:hover{background:var(--green4);color:var(--green);border-color:var(--green);transform:rotate(45deg);}

/* ── COLLECTIONS BAR ── */
.col-bar{display:flex;gap:8px;padding:16px 36px 0 36px;background:var(--surface);border-bottom:3px solid var(--green3);align-items:flex-end;overflow-x:auto;transition:border-color .4s;}
.col-bar::-webkit-scrollbar{display:none;}
.col-tab{padding:10px 18px;border-radius:12px 12px 0 0;background:var(--bg);border:1px solid var(--border);border-bottom:none;font-size:11.5px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .3s;font-family:inherit;margin-bottom:0;}
.col-tab:hover{background:var(--green4);}
.col-tab.on{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 -3px 10px rgba(0,0,0,.08);padding-bottom:12px;margin-bottom:-2px;}
.col-tab.drag-over{transform:scale(1.02);border-color:var(--accent1);background:var(--surface2);color:var(--accent1);}
.col-add{border:1px dashed var(--green);border-bottom:none;color:var(--green);background:transparent;}

.shelf-wrap{flex:1;padding:28px 36px;}
.shelf-lbl{font-size:10.5px;color:var(--green);letter-spacing:2.5px;text-transform:uppercase;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;transition:color .4s;}
.shelf-lbl::after{content:'';flex:1;height:1px;background:var(--border2);transition:background .4s;}
.shelf{background:var(--shelf);border-radius:8px 8px 3px 3px;padding:16px 20px 0;position:relative;box-shadow:inset 0 -5px 12px rgba(0,0,0,.08),0 8px 0 var(--shelf-edge),0 10px 16px rgba(0,0,0,.1);transition:background .4s, box-shadow .4s;}
.shelf::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(to bottom,var(--shelf-top),var(--shelf));border-radius:8px 8px 0 0;transition:background .4s;}
.books{display:flex;gap:12px;align-items:flex-end;padding-bottom:20px;flex-wrap:wrap;min-height:195px;}

/* Book */
.bk{cursor:pointer;transition:transform .22s, opacity .2s;position:relative;flex-shrink:0;}
.bk:hover{transform:translateY(-12px);}
.bk.drag-over{opacity:0.6;transform:scale(1.02);}
.bk-cover{width:110px;height:160px;border-radius:2px 6px 6px 2px;position:relative;overflow:hidden;box-shadow:-5px 5px 12px rgba(0,0,0,.25),inset -3px 0 6px rgba(0,0,0,.15);}
.bk-cover img{width:100%;height:100%;object-fit:cover;display:block;}
.bk-fallback{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:12px 10px;}
.bk-spine{position:absolute;left:0;top:0;bottom:0;width:11px;background:rgba(0,0,0,.25);border-right:1px solid rgba(255,255,255,.08);}
.bk-ttl{font-size:11px;font-weight:700;color:rgba(255,255,255,.96);text-align:center;margin-left:11px;line-height:1.3;text-shadow:0 1px 4px rgba(0,0,0,.5);}
.bk-auth{font-size:9px;color:rgba(255,255,255,.62);text-align:center;margin-left:11px;margin-top:5px;}
.bk-prog{position:absolute;bottom:0;left:11px;right:0;height:3px;background:rgba(0,0,0,.2);}
.bk-prog-fill{height:100%;background:rgba(255,255,255,.8);}
.bk-bdg{position:absolute;top:5px;right:5px;font-size:8px;padding:2px 5px;border-radius:6px;font-weight:700;z-index:2;}
.bdg-done{background:var(--green);color:#fff;transition:background .4s;}
.bdg-new{background:var(--accent1);color:#fff;transition:background .4s;}
.bk-meta{margin-top:7px;}
.bk-name{font-size:10.5px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;font-weight:500;}
.bk-pct{font-size:9.5px;color:var(--green);font-weight:600;margin-top:1px;transition:color .4s;}
.add-card{width:110px;height:160px;border:2px dashed var(--green3);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .4s;gap:6px;background:rgba(255,255,255,.5);}
.add-card:hover{border-color:var(--green);background:var(--green4);transform:translateY(-8px);}
.add-card-icon{font-size:22px;}
.add-card-txt{font-size:10px;color:var(--text3);text-align:center;line-height:1.6;}
.stats{background:var(--surface);border-top:1px solid var(--border2);padding:11px 36px;display:flex;gap:0;transition:border-color .4s;}
.stat{display:flex;align-items:center;gap:8px;padding-right:22px;margin-right:22px;border-right:1px solid var(--border2);transition:border-color .4s;}
.stat:last-child{border:none;}
.stat-ico{font-size:16px;}
.stat-v{font-size:16px;color:var(--green);font-weight:700;line-height:1;transition:color .4s;}
.stat-l{font-size:9.5px;color:var(--text3);letter-spacing:.4px;text-transform:uppercase;font-weight:500;margin-top:1px;}

/* ── READER ── */
#rdr{display:none;flex-direction:column;position:fixed;inset:0;background:var(--bg);z-index:100;}
#rdr.show{display:flex;}

/* Fullscreen UI Animations */
.rtop{background:var(--surface);height:50px;display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid var(--border);flex-shrink:0;box-shadow:0 1px 6px rgba(0,0,0,.04);transition:margin-top 0.4s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.4s;}
.rbot{background:var(--surface);height:52px;padding:9px 16px;border-top:1px solid var(--border2);display:flex;align-items:center;gap:10px;flex-shrink:0;transition:margin-bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.4s;}
#rdr.ui-hidden .rtop { margin-top: -50px; }
#rdr.ui-hidden .rbot { margin-bottom: -52px; }

.back-btn{background:var(--green4);border:1px solid var(--green3);color:var(--green);padding:6px 14px;border-radius:14px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;transition:all .4s;}
.back-btn:hover{background:var(--green);color:#fff;}
.rtitle{flex:1;font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.raction{display:flex;gap:2px;}
.ibtn{background:none;border:none;color:var(--text3);cursor:pointer;padding:7px;border-radius:8px;transition:all .4s;line-height:1;}
.ibtn:hover{background:var(--green4);color:var(--green);}
.ibtn.on{color:var(--accent1);background:var(--surface2);}
.ibtn svg{width:16px;height:16px;fill:currentColor;display:block;}

.rbody{flex:1;display:flex;overflow:hidden;position:relative;}
.rside{position:absolute;left:0;top:0;bottom:0;width:258px;background:var(--surface);border-right:1px solid var(--border2);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .28s ease;z-index:40;box-shadow:2px 0 16px rgba(0,0,0,.1);}
.rside.show{transform:translateX(0);}
.stabs{display:flex;border-bottom:1px solid var(--border2);transition:border-color .4s;}
.stab{flex:1;padding:10px 4px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:9.5px;font-family:inherit;transition:all .4s;letter-spacing:.7px;border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:700;text-transform:uppercase;}
.stab.on{color:var(--green);border-bottom-color:var(--green);}
.search-row{padding:9px 10px;border-bottom:1px solid var(--border2);flex-shrink:0;display:none;gap:6px;transition:border-color .4s;}
.search-row.show{display:flex;}
.sinput{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:border-color .4s, background .4s;}
.sinput:focus{border-color:var(--green);}
.sgo{background:var(--green);border:none;color:#fff;padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;transition:background .4s;}
.scontent{flex:1;overflow-y:auto;padding:8px;}
.titem{padding:7px 9px;border-radius:6px;cursor:pointer;font-size:12.5px;color:var(--text2);transition:all .4s;line-height:1.4;}
.titem:hover{background:var(--green4);color:var(--green);}
.bmitem{padding:9px;border-radius:7px;background:var(--surface2);margin-bottom:5px;cursor:pointer;border:1px solid var(--border2);transition:all .4s;}
.bmitem:hover{background:var(--green4);border-color:var(--green3);}
.bmpage{font-size:10.5px;color:var(--green);font-weight:700;transition:color .4s;}
.bmdate{font-size:11px;color:var(--text3);margin-top:1px;}
.bmdel{float:right;background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;transition:color .15s;}
.bmdel:hover{color:var(--accent1);}
.empty{color:var(--text3);font-size:12px;padding:20px 6px;text-align:center;line-height:1.8;}

.rarea{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.rcontent{flex:1;overflow:auto;padding:24px 16px;position:relative;touch-action: pan-x pan-y;} 
.theme-light .rcontent{background:#FFFDF8;}
.theme-sepia .rcontent{background:#F5EDD8;}
.theme-dark .rcontent{background:#181C14;}

/* AI Enhance FX */
.enhance-on canvas { filter: url(#ai-enhance) contrast(1.05) brightness(1.02); }

.czone{position:absolute;top:50%;transform:translateY(-50%);width:52px;height:64px;z-index:15;cursor:pointer;display:flex;align-items:center;opacity:0;transition:opacity .2s;}
.rarea:hover .czone{opacity:.55;}
.czone:hover{opacity:1!important;}
.czone.left{left:4px;justify-content:flex-start;}
.czone.right{right:4px;justify-content:flex-end;}
.carrow{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.93);border:1.5px solid var(--green3);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--green);box-shadow:0 2px 10px rgba(0,0,0,.1);transition:all .4s;pointer-events:none;}
.czone:hover .carrow{background:var(--green);color:#fff;box-shadow:0 3px 14px rgba(0,0,0,.2);}
.cwrap{display:table;margin:0 auto;transition:transform 0.1s; transform-origin: center top;} 
.cwrap.dbl{display:flex;flex-direction:row;justify-content:center;gap:6px;align-items:flex-start;margin:0 auto;width:max-content;}
.cwrap.dbl canvas{max-width:none;}
.pdiv{width:2px;background:var(--border2);align-self:stretch;flex-shrink:0;transition:background .4s;}
canvas{display:block;box-shadow:0 3px 18px rgba(0,0,0,.12);border-radius:1px;}
#epub-area{width:100%;max-width:760px;}
#txt-area{display:none;width:100%;max-width:700px;margin:0 auto;}

/* Settings panel */
.spanel{position:absolute;top:0;right:0;height:100%;width:258px;background:var(--surface);border-left:1px solid var(--border2);padding:16px 14px;display:flex;flex-direction:column;gap:16px;transform:translateX(258px);transition:transform .28s ease;z-index:10;overflow-y:auto;}
.spanel.show{transform:translateX(0);box-shadow:-2px 0 16px rgba(0,0,0,.08);}
.shd{font-size:10.5px;color:var(--green);letter-spacing:2px;text-transform:uppercase;padding-bottom:10px;border-bottom:1px solid var(--border2);font-weight:700;transition:border-color .4s, color .4s;}
.sg label{display:block;font-size:9.5px;color:var(--text3);margin-bottom:7px;letter-spacing:.7px;text-transform:uppercase;font-weight:700;}
.theme-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.tbtn{padding:9px 3px;border-radius:7px;cursor:pointer;font-size:11px;border:2px solid transparent;transition:all .4s;font-family:inherit;font-weight:600;}
.tbtn.light{background:#FFFDF8;color:#3A2A18;border-color:var(--border);}
.tbtn.sepia{background:#F5EDD8;color:#5A3A18;border-color:#D8C8A0;}
.tbtn.dark{background:#181C14;color:#D0E8C0;border-color:#3A4030;}
.tbtn.on{border-color:var(--green)!important;box-shadow:0 0 0 2px var(--green3);}
.row3{display:flex;align-items:center;gap:8px;}
.smbtn{background:var(--bg);border:1px solid var(--border);color:var(--text);height:32px;min-width:32px;border-radius:7px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;font-family:inherit;font-weight:600;padding:0 8px;transition:all .4s;}
.smbtn:hover{background:var(--green4);border-color:var(--green3);color:var(--green);}
.smval{color:var(--text);font-size:13px;min-width:38px;text-align:center;font-weight:600;}

/* AI Slider */
.ai-slider{width:100%; -webkit-appearance:none; background:transparent; margin-top:4px;}
.ai-slider::-webkit-slider-runnable-track{width:100%; height:6px; cursor:pointer; background:var(--border2); border-radius:3px; transition:background .4s;}
.ai-slider::-webkit-slider-thumb{height:16px; width:16px; border-radius:50%; background:var(--green); cursor:pointer; -webkit-appearance:none; margin-top:-5px; box-shadow:0 1px 4px rgba(0,0,0,.2); transition:transform .2s;}
.ai-slider::-webkit-slider-thumb:hover{transform:scale(1.2);}

.fflist{display:flex;flex-direction:column;gap:4px;}
.ffbtn{padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:7px;cursor:pointer;color:var(--text2);text-align:left;transition:all .4s;font-size:12.5px;font-family:inherit;}
.ffbtn:hover{background:var(--green4);border-color:var(--green3);}
.ffbtn.on{border-color:var(--green);color:var(--green);background:var(--green4);font-weight:600;}
.lhrow{display:flex;gap:5px;}
.lhbtn{flex:1;padding:6px;background:var(--bg);border:1px solid var(--border);border-radius:7px;cursor:pointer;color:var(--text2);font-size:11px;transition:all .4s;text-align:center;font-family:inherit;font-weight:500;}
.lhbtn:hover{background:var(--green4);}
.lhbtn.on{border-color:var(--green);color:var(--green);background:var(--green4);}
.lyrow{display:flex;gap:5px;}
.lybtn{flex:1;padding:9px 4px;background:var(--bg);border:2px solid var(--border);border-radius:7px;cursor:pointer;color:var(--text2);font-size:10.5px;transition:all .4s;text-align:center;font-family:inherit;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;}
.lybtn:hover{background:var(--green4);}
.lybtn.on{border-color:var(--green);color:var(--green);background:var(--green4);}
.lyico{font-size:15px;}
.statinfo{font-size:12px;color:var(--text3);line-height:2.1;}
.statinfo strong{color:var(--green);transition:color .4s;}
.nbtn{background:var(--green4);border:1px solid var(--green3);color:var(--green);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .4s;flex-shrink:0;}
.nbtn:hover{background:var(--green);color:#fff;}
.nbtn:disabled{opacity:.28;cursor:default;background:var(--bg);}
.ptrack{flex:1;height:5px;background:var(--border2);border-radius:3px;cursor:pointer;transition:background .4s;}
.pfill{height:100%;background:linear-gradient(90deg,var(--green),var(--sky));border-radius:3px;transition:width .2s, background .4s;}
.pinfo{font-size:12px;color:var(--text3);min-width:66px;text-align:center;font-weight:500;}

/* Loading */
.loverlay{position:absolute;inset:0;background:rgba(244,249,241,.88);display:none;align-items:center;justify-content:center;z-index:30;flex-direction:column;gap:12px;}
.loverlay.show{display:flex;}
.spin{width:34px;height:34px;border:3px solid var(--green3);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

/* Toast & Modals */
.toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--green);color:#fff;padding:8px 18px;border-radius:18px;font-size:12.5px;font-weight:600;opacity:0;transition:all .4s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;}
.mbg.show{display:flex;}
.mbox{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px;max-width:380px;width:90%;box-shadow:0 14px 40px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto;}
.mtitle{color:var(--green);font-size:16px;font-weight:700;margin-bottom:10px;transition:color .4s;}
.mbody{color:var(--text2);font-size:13px;line-height:1.7;margin-bottom:18px;}
.mbtns{display:flex;gap:8px;justify-content:flex-end;}
.mbtn{padding:8px 18px;border-radius:18px;cursor:pointer;font-size:13px;font-family:inherit;border:1px solid var(--border);color:var(--text2);background:var(--bg);font-weight:500;transition:all .4s;}
.mbtn:hover{background:var(--green4);}
.mbtn.pri{background:var(--green);color:#fff;border-color:var(--green);}
.mbtn.pri:hover{filter:brightness(0.9);}
.minput{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:all .4s;}
.minput:focus{border-color:var(--green);}

/* Color Grid */
.color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px;}
.c-btn{height:36px;border-radius:8px;border:2px solid transparent;cursor:pointer;transition:all .2s;}
.c-btn:hover{transform:scale(1.1);}
.c-btn.on{border-color:var(--text);box-shadow:0 0 0 2px var(--surface), 0 0 0 4px var(--text);}

/* Context menu */
.ctx{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:6px 0;z-index:200;box-shadow:0 6px 20px rgba(0,0,0,.15);min-width:158px;display:none;transition:border-color .4s;}
.ctx.show{display:block;}
.citem{padding:8px 14px;font-size:13px;color:var(--text2);cursor:pointer;transition:background .4s, color .4s;}
.citem:hover{background:var(--green4);color:var(--green);}
.csep{height:1px;background:var(--border2);margin:4px 0;transition:background .4s;}
.drop{position:fixed;inset:0;background:rgba(0,0,0,.1);z-index:50;display:none;align-items:center;justify-content:center;pointer-events:none;}
.drop.show{display:flex;}
.dropbox{background:var(--surface);border:3px dashed var(--green);border-radius:18px;padding:40px 56px;text-alig
