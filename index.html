<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rafım v3 — Kategorili Kitaplık</title>
<style>
:root {
  --wood-darkest: #140C06; --wood-dark: #241208; --wood: #3A1C0A;
  --wood-mid: #5C2E10; --wood-light: #7A3F18; --amber: #C8700A;
  --gold: #D4A040; --cream: #F5ECD7; --paper: #FBF6EC;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--wood-darkest); color: var(--cream); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* HEADER */
.app-header { background: linear-gradient(to bottom, var(--wood-dark), var(--wood)); height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid var(--amber); flex-shrink: 0; }
.logo { font-size: 24px; font-weight: bold; color: var(--gold); letter-spacing: 2px; }

/* MAIN LAYOUT */
.main-container { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR (Playlist Style) */
.sidebar { width: 260px; background: var(--wood-dark); border-right: 1px solid rgba(200, 112, 10, 0.3); display: flex; flex-direction: column; padding: 20px 0; }
.sidebar-section-title { font-size: 11px; color: var(--amber); letter-spacing: 2px; padding: 0 20px 10px; opacity: 0.7; text-transform: uppercase; }
.category-list { flex: 1; overflow-y: auto; margin-bottom: 20px; }
.category-item { padding: 10px 20px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; font-size: 14px; border-left: 3px solid transparent; }
.category-item:hover { background: rgba(255,255,255,0.05); }
.category-item.active { background: rgba(200, 112, 10, 0.15); border-left-color: var(--amber); color: var(--gold); }
.category-item .delete-cat { opacity: 0; color: #ff4444; font-size: 12px; }
.category-item:hover .delete-cat { opacity: 1; }
.add-cat-btn { margin: 0 20px; padding: 8px; background: transparent; border: 1px dashed var(--amber); color: var(--amber); cursor: pointer; border-radius: 4px; font-size: 13px; }

/* CONTENT AREA */
.content-area { flex: 1; overflow-y: auto; padding: 30px; background: rgba(0,0,0,0.2); }
.shelf-title { font-size: 24px; margin-bottom: 20px; color: var(--gold); }
.books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 25px; }

/* BOOK ITEM */
.book-card { width: 120px; cursor: pointer; transition: transform 0.2s; }
.book-card:hover { transform: translateY(-5px); }
.cover-box { width: 120px; height: 170px; background: #222; border-radius: 4px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.5); position: relative; border: 1px solid rgba(255,255,255,0.1); }
.cover-box img { width: 100%; height: 100%; object-fit: cover; }
.book-info { margin-top: 10px; font-size: 12px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* READER VIEW (Full Overlay) */
#reader-view { position: fixed; inset: 0; background: var(--paper); z-index: 1000; display: none; flex-direction: column; }
#reader-view.active { display: flex; }
.reader-controls { background: var(--wood-dark); height: 50px; display: flex; align-items: center; padding: 0 20px; color: white; justify-content: space-between; }

/* UTILS */
.loader { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 2000; }
.btn { background: var(--amber); border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">RAFIM</div>
  <button class="btn" onclick="document.getElementById('file-input').click()">+ Kitap Yükle</button>
</header>

<div class="main-container">
  <!-- Sol Menü (Kategoriler) -->
  <aside class="sidebar">
    <div class="sidebar-section-title">Kitaplıklarım</div>
    <div class="category-list" id="category-list">
      <!-- Kategoriler buraya gelecek -->
    </div>
    <button class="add-cat-btn" onclick="addNewCategory()">+ Yeni Liste Oluştur</button>
  </aside>

  <!-- Sağ İçerik -->
  <main class="content-area">
    <h2 class="shelf-title" id="current-category-title">Tüm Kitaplar</h2>
    <div class="books-grid" id="books-grid"></div>
  </main>
</div>

<!-- Okuma Ekranı -->
<div id="reader-view">
  <div class="reader-controls">
    <button onclick="closeReader()" style="background:none; border:1px solid #777; color:white; cursor:pointer; padding:5px 10px;">← Kapat</button>
    <div id="reader-book-name">Kitap</div>
    <div id="page-nav">
      <button onclick="changePage(-1)">‹</button>
      <span id="page-num">0/0</span>
      <button onclick="changePage(1)">›</button>
    </div>
  </div>
  <div id="canvas-container" style="flex:1; overflow:auto; display:flex; justify-content:center; padding:20px;"></div>
</div>

<div class="loader" id="loader"><div style="text-align:center;"><p>İşleniyor...</p></div></div>
<input type="file" id="file-input" accept=".pdf" hidden>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let db;
let currentCatId = 'all';
let categories = []; 
let books = [];

// INDEXEDDB
const req = indexedDB.open("RafimV3", 1);
req.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore("books", { keyPath: "id" });
  db.createObjectStore("categories", { keyPath: "id" });
};
req.onsuccess = e => {
  db = e.target.result;
  initApp();
};

async function initApp() {
  await loadCategories();
  await loadBooks();
  renderCategories();
  renderBooks();
}

// KATEGORİ İŞLEMLERİ
async function loadCategories() {
  const tx = db.transaction("categories", "readonly");
  categories = await new Promise(r => tx.objectStore("categories").getAll().onsuccess = e => r(e.target.result));
  if (categories.length === 0) {
    categories = [{ id: 'all', name: 'Tüm Kitaplar' }];
  }
}

function renderCategories() {
  const list = document.getElementById('category-list');
  list.innerHTML = '';
  categories.forEach(cat => {
    const div = document.createElement('div');
    div.className = `category-item ${currentCatId === cat.id ? 'active' : ''}`;
    div.onclick = () => { currentCatId = cat.id; renderCategories(); renderBooks(); };
    div.innerHTML = `
      <span>${cat.name}</span>
      ${cat.id !== 'all' ? `<span class="delete-cat" onclick="deleteCategory('${cat.id}', event)">✕</span>` : ''}
    `;
    list.appendChild(div);
  });
}

async function addNewCategory() {
  const name = prompt("Liste adı ne olsun?");
  if (!name) return;
  const newCat = { id: 'cat_' + Date.now(), name: name };
  const tx = db.transaction("categories", "readwrite");
  tx.objectStore("categories").add(newCat);
  tx.oncomplete = () => { categories.push(newCat); renderCategories(); };
}

async function deleteCategory(id, event) {
  event.stopPropagation();
  if (!confirm("Bu listeyi silmek istediğine emin misin? Kitaplar silinmez.")) return;
  const tx = db.transaction("categories", "readwrite");
  tx.objectStore("categories").delete(id);
  tx.oncomplete = () => {
    categories = categories.filter(c => c.id !== id);
    if (currentCatId === id) currentCatId = 'all';
    renderCategories();
    renderBooks();
  };
}

// KİTAP YÜKLEME (DOĞRUDAN BLOB OLARAK)
document.getElementById('file-input').onchange = async e => {
  const file = e.target.files[0];
  if (!file) return;

  document.getElementById('loader').style.display = 'flex';
  
  try {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    const page = await pdf.getPage(1);
    const canvas = document.createElement('canvas');
    const viewport = page.getViewport({ scale: 0.3 });
    canvas.width = viewport.width; canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    
    const newBook = {
      id: 'b_' + Date.now(),
      title: file.name.replace(".pdf", ""),
      content: arrayBuffer, // Direkt buffer saklıyoruz
      cover: canvas.toDataURL(),
      catId: currentCatId,
      curPage: 1
    };

    const tx = db.transaction("books", "readwrite");
    tx.objectStore("books").add(newBook);
    tx.oncomplete = () => {
      books.push(newBook);
      renderBooks();
      document.getElementById('loader').style.display = 'none';
      e.target.value = ''; // Inputu temizle
    };
  } catch (err) {
    alert("Hata: PDF işlenemedi.");
    document.getElementById('loader').style.display = 'none';
  }
};

async function loadBooks() {
  const tx = db.transaction("books", "readonly");
  books = await new Promise(r => tx.objectStore("books").getAll().onsuccess = e => r(e.target.result));
}

function renderBooks() {
  const grid = document.getElementById('books-grid');
  const title = document.getElementById('current-category-title');
  const activeCat = categories.find(c => c.id === currentCatId);
  title.innerText = activeCat ? activeCat.name : "Kitaplar";
  
  grid.innerHTML = '';
  const filtered = currentCatId === 'all' ? books : books.filter(b => b.catId === currentCatId);
  
  filtered.forEach(book => {
    const div = document.createElement('div');
    div.className = 'book-card';
    div.onclick = () => openReader(book);
    div.oncontextmenu = (e) => {
        e.preventDefault();
        moveBook(book.id);
    };
    div.innerHTML = `
      <div class="cover-box"><img src="${book.cover}"></div>
      <div class="book-info">${book.title}</div>
    `;
    grid.appendChild(div);
  });
}

// KİTABI BAŞKA LİSTEYE TAŞI
async function moveBook(bookId) {
    const targetCatName = prompt("Hangi listeye taşımak istersin? (Tam adı yazın)");
    const targetCat = categories.find(c => c.name.toLowerCase() === targetCatName?.toLowerCase());
    if(!targetCat) return alert("Liste bulunamadı.");
    
    const book = books.find(b => b.id === bookId);
    book.catId = targetCat.id;
    
    const tx = db.transaction("books", "readwrite");
    tx.objectStore("books").put(book);
    tx.oncomplete = () => renderBooks();
}

// OKUMA MANTIĞI
let activePdf = null;
let activeBookData = null;
let pageNum = 1;

async function openReader(book) {
  document.getElementById('loader').style.display = 'flex';
  activeBookData = book;
  pageNum = book.curPage || 1;
  
  activePdf = await pdfjsLib.getDocument({ data: book.content }).promise;
  document.getElementById('reader-book-name').innerText = book.title;
  document.getElementById('reader-view').classList.add('active');
  renderReaderPage();
  document.getElementById('loader').style.display = 'none';
}

async function renderReaderPage() {
  const page = await activePdf.getPage(pageNum);
  const container = document.getElementById('canvas-container');
  container.innerHTML = '';
  
  const canvas = document.createElement('canvas');
  const viewport = page.getViewport({ scale: 1.5 });
  canvas.width = viewport.width; canvas.height = viewport.height;
  container.appendChild(canvas);
  
  await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  document.getElementById('page-num').innerText = `${pageNum} / ${activePdf.numPages}`;
}

function changePage(dir) {
  if (!activePdf) return;
  const newPage = pageNum + dir;
  if (newPage < 1 || newPage > activePdf.numPages) return;
  pageNum = newPage;
  renderReaderPage();
  
  // Kaldığı yeri kaydet
  activeBookData.curPage = pageNum;
  const tx = db.transaction("books", "readwrite");
  tx.objectStore("books").put(activeBookData);
}

function closeReader() {
  document.getElementById('reader-view').classList.remove('active');
  activePdf = null;
}
</script>
</body>
</html>
