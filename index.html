<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rafım — Dijital Kitaplık v2.0</title>
<style>
/* CLAUDE'UN TASARIMI + GELİŞTİRMELER */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --wood-darkest:#140C06; --wood-dark:#241208; --wood:#3A1C0A;
  --wood-mid:#5C2E10; --wood-light:#7A3F18; --amber:#C8700A;
  --amber-bright:#E8900E; --gold:#D4A040; --gold-light:#F0C060;
  --cream:#F5ECD7; --paper:#FBF6EC; --text-dark:#2C1A0E;
  --sepia-bg:#F0E6C8; --sepia-text:#5C3A20; --dark-bg:#130F0B; --dark-text:#E8D5B0;
}
body{font-family:Georgia,serif;background:var(--wood-darkest);min-height:100vh;color:var(--cream);}
#library-view{display:flex;flex-direction:column;min-height:100vh;}
#library-view.hidden{display:none;}

/* HEADER */
.app-header{background:linear-gradient(to bottom,var(--wood-dark),var(--wood));padding:20px 40px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--amber);box-shadow:0 4px 24px rgba(0,0,0,.7);}
.app-name{font-size:30px;color:var(--gold);font-weight:700;letter-spacing:3px;text-shadow:0 2px 12px rgba(0,0,0,.6);}
.upload-btn{background:var(--amber);color:var(--wood-darkest);border:none;padding:10px 22px;border-radius:6px;font-weight:700;cursor:pointer;transition:all .2s;}
.upload-btn:hover{background:var(--amber-bright);transform:translateY(-1px);}

/* SHELF AREA */
.shelf-container{flex:1;padding:36px 40px;}
.shelf{background:var(--wood);border-radius:6px;padding:20px 24px;position:relative;box-shadow:inset 0 0 80px rgba(0,0,0,.35),0 8px 0 var(--wood-darkest);}
.books-row{display:flex;gap:20px;align-items:flex-end;padding-bottom:18px;flex-wrap:wrap;min-height:200px;}

/* BOOK ITEMS (Geliştirilmiş) */
.book-item{cursor:pointer;transition:transform .2s;position:relative;width:110px;}
.book-item:hover{transform:translateY(-10px);}
.book-cover{width:110px;height:158px;border-radius:2px 7px 7px 2px;position:relative;background:#444;overflow:hidden;box-shadow:-5px 5px 12px rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;background-size:cover;background-position:center;}
.book-cover img { width: 100%; height: 100%; object-fit: cover; }
.book-cover-title-overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.7);color:white;font-size:9px;padding:4px;text-align:center;}
.book-progress-bar{position:absolute;bottom:0;left:0;right:0;height:4px;background:rgba(0,0,0,.3);}
.book-progress-fill{height:100%;background:var(--gold-light);}
.book-label-name{font-size:11px;color:var(--cream);margin-top:8px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* READER VIEW */
#reader-view{display:none;flex-direction:column;height:100vh;overflow:hidden;background:var(--paper);}
#reader-view.active{display:flex;}
.reader-topbar{background:var(--wood-dark);padding:0 16px;height:50px;display:flex;align-items:center;border-bottom:2px solid var(--amber);z-index:100;}
.reading-content{flex:1;overflow-y:auto;display:flex;justify-content:center;padding:20px;}
#canvas-wrap{max-width:900px;width:100%;}
.pdf-canvas{width:100%;box-shadow:0 0 20px rgba(0,0,0,0.2);margin-bottom:20px;}

/* UI ELEMENTS */
.loading-over{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:1000;color:var(--gold);}
.spinner{width:40px;height:40px;border:4px solid rgba(212,160,64,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--amber);color:black;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:bold;z-index:2000;display:none;}

/* DRAG & DROP VISUAL */
.book-item.dragging { opacity: 0.5; transform: scale(0.9); }
</style>
</head>
<body>

<div id="library-view">
  <header class="app-header">
    <div class="app-name">RAFIM</div>
    <button class="upload-btn" onclick="triggerUpload()">+ Kitap Ekle</button>
  </header>
  <div class="shelf-container">
    <div class="shelf">
      <div class="books-row" id="books-row" ondragover="allowDrop(event)" ondrop="handleDropSort(event)"></div>
    </div>
  </div>
</div>

<div id="reader-view">
  <div class="reader-topbar">
    <button style="background:none; border:1px solid var(--amber); color:var(--amber); cursor:pointer; padding:5px 10px;" onclick="closeReader()">← Geri</button>
    <div id="reader-title" style="margin-left:20px; color:var(--gold); flex:1;"></div>
    <div style="color:var(--cream); font-size:12px;" id="page-info">0 / 0</div>
  </div>
  <div class="reading-content" id="reading-content">
    <div id="canvas-wrap"></div>
  </div>
  <div style="background:var(--wood-dark); padding:10px; display:flex; justify-content:center; gap:20px;">
    <button onclick="prevPage()" class="upload-btn">Geri</button>
    <button onclick="nextPage()" class="upload-btn">İleri</button>
  </div>
</div>

<div class="loading-over" id="loading-over"><div class="spinner"></div><p>Yükleniyor...</p></div>
<div class="toast" id="toast"></div>
<input type="file" id="file-input" accept=".pdf" hidden>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let db;
const S = { books: [], curBook: null, pdfDoc: null, curPage: 1 };

// 1. INDEXEDDB KURULUMU
const request = indexedDB.open("RafimDB", 1);
request.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore("books", { keyPath: "id" });
};
request.onsuccess = e => {
  db = e.target.result;
  loadBooksFromDB();
};

async function loadBooksFromDB() {
  const transaction = db.transaction("books", "readonly");
  const store = transaction.objectStore("books");
  const request = store.getAll();
  request.onsuccess = () => {
    S.books = request.result || [];
    renderLib();
  };
}

// 2. KİTAP EKLEME VE KAPAK OLUŞTURMA
function triggerUpload() { document.getElementById('file-input').click(); }

document.getElementById('file-input').onchange = async e => {
  const file = e.target.files[0];
  if (!file) return;

  showLoading(true);
  const id = "book_" + Date.now();
  const arrayBuffer = await file.arrayBuffer();
  
  // Kapak Resmi Oluştur (PDF 1. Sayfa)
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const page = await pdf.getPage(1);
  const viewport = page.getViewport({ scale: 0.2 });
  const canvas = document.createElement('canvas');
  const context = canvas.getContext('2d');
  canvas.height = viewport.height;
  canvas.width = viewport.width;
  await page.render({ canvasContext: context, viewport: viewport }).promise;
  const coverImg = canvas.toDataURL();

  const newBook = {
    id,
    title: file.name,
    data: arrayBuffer,
    cover: coverImg,
    progress: 0,
    curPage: 1,
    order: S.books.length
  };

  const transaction = db.transaction("books", "readwrite");
  transaction.objectStore("books").add(newBook);
  transaction.oncomplete = () => {
    S.books.push(newBook);
    renderLib();
    showLoading(false);
    showToast("Kitap eklendi!");
  };
};

// 3. KÜTÜPHANE RENDER (Sürükle-Bırak Destekli)
function renderLib() {
  const row = document.getElementById('books-row');
  row.innerHTML = '';
  
  S.books.sort((a, b) => a.order - b.order).forEach((book, index) => {
    const div = document.createElement('div');
    div.className = 'book-item';
    div.draggable = true;
    div.dataset.id = book.id;
    div.dataset.index = index;
    
    // Drag olayları
    div.ondragstart = e => { e.dataTransfer.setData("text/plain", index); div.classList.add('dragging'); };
    div.ondragend = () => div.classList.remove('dragging');
    
    div.onclick = () => openBook(book.id);
    div.innerHTML = `
      <div class="book-cover" style="background-image: url(${book.cover})">
        <div class="book-progress-bar"><div class="book-progress-fill" style="width:${book.progress}%"></div></div>
      </div>
      <div class="book-label-name">${book.title}</div>
    `;
    row.appendChild(div);
  });
}

// Sürükle-Bırak Sıralama
function allowDrop(e) { e.preventDefault(); }
function handleDropSort(e) {
  e.preventDefault();
  const fromIndex = e.dataTransfer.getData("text/plain");
  const toElement = e.target.closest('.book-item');
  if (!toElement) return;
  const toIndex = toElement.dataset.index;

  const movedItem = S.books.splice(fromIndex, 1)[0];
  S.books.splice(toIndex, 0, movedItem);
  
  // Yeni sıralamayı DB'ye kaydet
  const transaction = db.transaction("books", "readwrite");
  const store = transaction.objectStore("books");
  S.books.forEach((b, i) => {
    b.order = i;
    store.put(b);
  });
  renderLib();
}

// 4. OKUYUCU FONKSİYONLARI
async function openBook(id) {
  showLoading(true);
  const transaction = db.transaction("books", "readonly");
  const request = transaction.objectStore("books").get(id);
  
  request.onsuccess = async () => {
    const book = request.result;
    S.curBook = book;
    S.curPage = book.curPage || 1;
    
    S.pdfDoc = await pdfjsLib.getDocument({ data: book.data }).promise;
    document.getElementById('reader-title').textContent = book.title;
    document.getElementById('library-view').classList.add('hidden');
    document.getElementById('reader-view').classList.add('active');
    
    renderPage(S.curPage);
    showLoading(false);
  };
}

async function renderPage(num) {
  const page = await S.pdfDoc.getPage(num);
  const viewport = page.getViewport({ scale: 1.5 });
  const canvas = document.createElement('canvas');
  canvas.className = 'pdf-canvas';
  const context = canvas.getContext('2d');
  canvas.height = viewport.height;
  canvas.width = viewport.width;

  const wrap = document.getElementById('canvas-wrap');
  wrap.innerHTML = '';
  wrap.appendChild(canvas);
  
  await page.render({ canvasContext: context, viewport: viewport }).promise;
  
  document.getElementById('page-info').textContent = `${num} / ${S.pdfDoc.numPages}`;
  
  // İlerlemeyi kaydet
  S.curBook.curPage = num;
  S.curBook.progress = Math.round((num / S.pdfDoc.numPages) * 100);
  const tx = db.transaction("books", "readwrite");
  tx.objectStore("books").put(S.curBook);
}

function prevPage() { if (S.curPage > 1) renderPage(--S.curPage); }
function nextPage() { if (S.curPage < S.pdfDoc.numPages) renderPage(++S.curPage); }

function closeReader() {
  document.getElementById('reader-view').classList.remove('active');
  document.getElementById('library-view').classList.remove('hidden');
  renderLib();
}

// UTILS
function showLoading(v) { document.getElementById('loading-over').style.display = v ? 'flex' : 'none'; }
function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}
</script>
</body>
</html>
