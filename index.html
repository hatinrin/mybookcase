<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Like My Book Case</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#F4F9F1;--surface:#FFFFFF;--surface2:#F0F7EC;
  --green:#4E9A6A; --green2:#7BBF90; --green3:#C2E5CE; --green4:#EAF7EE;
  --accent1:#E05C85; --accent2:#C0406A;
  --sky:#60AADC;--lav:#9B7EC8;
  --text:#2A3828;--text2:#4A6048;--text3:#7A9070;
  --border:#CAE0BE;--border2:#DDEEDD;
  --shelf:#D0E5C2;--shelf-edge:#88A878;--shelf-top:#A8C898;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;transition:background .4s ease, color .4s ease;overflow-x:hidden;}

/* ── TOP TOAST ── */
.top-toast{position:fixed;top:0;left:50%;transform:translate(-50%,-100%);background:var(--surface);color:var(--green);border:2px solid var(--green);padding:10px 28px;border-radius:0 0 16px 16px;font-weight:700;font-size:14px;box-shadow:0 6px 20px rgba(0,0,0,.15);z-index:2000;transition:all .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
.top-toast.show{transform:translate(-50%,0);}

/* ── LIBRARY ── */
#lib{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh;}
#lib.hide{display:none;}
.hdr{background:var(--surface);padding:14px 36px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border2);position:sticky;top:0;z-index:50;transition:border-color .4s;}
.hdr-left{display:flex;align-items:center;gap:12px;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.logo{font-size:28px;}
.app-name{font-size:22px;color:var(--green);font-weight:800;letter-spacing:1px;text-transform:uppercase;transition:color .4s;}
.app-sub{font-size:11px;color:var(--accent1);letter-spacing:1.5px;font-weight:500;margin-top:1px;transition:color .4s;}
.add-btn{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;border:none;padding:9px 20px;border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 3px 10px rgba(0,0,0,.15);transition:all .4s;}
.add-btn:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.25);}
.app-set-btn{background:var(--bg);border:1px solid var(--border);color:var(--text2);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .4s;}
.app-set-btn:hover{background:var(--green4);color:var(--green);border-color:var(--green);transform:rotate(45deg);}

/* ── COLLECTIONS BAR ── */
.col-bar{display:flex;gap:8px;padding:16px 36px 0 36px;background:var(--surface);border-bottom:3px solid var(--green3);align-items:flex-end;overflow-x:auto;transition:border-color .4s;}
.col-bar::-webkit-scrollbar{display:none;}
.col-tab{padding:10px 18px;border-radius:12px 12px 0 0;background:var(--bg);border:1px solid var(--border);border-bottom:none;font-size:11.5px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .3s;font-family:inherit;margin-bottom:0;}
.col-tab:hover{background:var(--green4);}
.col-tab.on{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 -3px 10px rgba(0,0,0,.08);padding-bottom:12px;margin-bottom:-2px;}
.col-tab.drag-over{transform:scale(1.02);border-color:var(--accent1);background:var(--surface2);color:var(--accent1);}
.col-add{border:1px dashed var(--green);border-bottom:none;color:var(--green);background:transparent;}

.shelf-wrap{flex:1;padding:28px 36px;}
.shelf-lbl{font-size:10.5px;color:var(--green);letter-spacing:2.5px;text-transform:uppercase;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;transition:color .4s;}
.shelf-lbl::after{content:'';flex:1;height:1px;background:var(--border2);transition:background .4s;}
.shelf{background:var(--shelf);border-radius:8px 8px 3px 3px;padding:16px 20px 0;position:relative;box-shadow:inset 0 -5px 12px rgba(0,0,0,.08),0 8px 0 var(--shelf-edge),0 10px 16px rgba(0,0,0,.1);transition:background .4s, box-shadow .4s;}
.shelf::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(to bottom,var(--shelf-top),var(--shelf));border-radius:8px 8px 0 0;transition:background .4s;}
.books{display:flex;gap:12px;align-items:flex-end;padding-bottom:20px;flex-wrap:wrap;min-height:195px;}

/* Book */
.bk{cursor:pointer;transition:transform .22s, opacity .2s;position:relative;flex-shrink:0;}
.bk:hover{transform:translateY(-12px);}
.bk.drag-over{opacity:0.6;transform:scale(1.02);}
.bk-cover{width:110px;height:160px;border-radius:2px 6px 6px 2px;position:relative;overflow:hidden;box-shadow:-5px 5px 12px rgba(0,0,0,.25),inset -3px 0 6px rgba(0,0,0,.15);}
.bk-cover img{width:100%;height:100%;object-fit:cover;display:block;}
.bk-fallback{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:12px 10px;}
.bk-spine{position:absolute;left:0;top:0;bottom:0;width:11px;background:rgba(0,0,0,.25);border-right:1px solid rgba(255,255,255,.08);}
.bk-ttl{font-size:11px;font-weight:700;color:rgba(255,255,255,.96);text-align:center;margin-left:11px;line-height:1.3;text-shadow:0 1px 4px rgba(0,0,0,.5);}
.bk-auth{font-size:9px;color:rgba(255,255,255,.62);text-align:center;margin-left:11px;margin-top:5px;}
.bk-prog{position:absolute;bottom:0;left:11px;right:0;height:3px;background:rgba(0,0,0,.2);}
.bk-prog-fill{height:100%;background:rgba(255,255,255,.8);}
.bk-bdg{position:absolute;top:5px;right:5px;font-size:8px;padding:2px 5px;border-radius:6px;font-weight:700;z-index:2;}
.bdg-done{background:var(--green);color:#fff;transition:background .4s;}
.bdg-new{background:var(--accent1);color:#fff;transition:background .4s;}
.bk-meta{margin-top:7px;}
.bk-name{font-size:10.5px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;font-weight:500;}
.bk-pct{font-size:9.5px;color:var(--green);font-weight:600;margin-top:1px;transition:color .4s;}
.add-card{width:110px;height:160px;border:2px dashed var(--green3);border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .4s;gap:6px;background:rgba(255,255,255,.5);}
.add-card:hover{border-color:var(--green);background:var(--green4);transform:translateY(-8px);}
.add-card-icon{font-size:22px;}
.add-card-txt{font-size:10px;color:var(--text3);text-align:center;line-height:1.6;}
.stats{background:var(--surface);border-top:1px solid var(--border2);padding:11px 36px;display:flex;gap:0;transition:border-color .4s;}
.stat{display:flex;align-items:center;gap:8px;padding-right:22px;margin-right:22px;border-right:1px solid var(--border2);transition:border-color .4s;}
.stat:last-child{border:none;}
.stat-ico{font-size:16px;}
.stat-v{font-size:16px;color:var(--green);font-weight:700;line-height:1;transition:color .4s;}
.stat-l{font-size:9.5px;color:var(--text3);letter-spacing:.4px;text-transform:uppercase;font-weight:500;margin-top:1px;}

/* ── READER ── */
#rdr{display:none;flex-direction:column;position:fixed;inset:0;background:var(--bg);z-index:100;}
#rdr.show{display:flex;}

/* Fullscreen UI Animations */
.rtop{background:var(--surface);height:50px;display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid var(--border);flex-shrink:0;box-shadow:0 1px 6px rgba(0,0,0,.04);transition:margin-top 0.4s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.4s;}
.rbot{background:var(--surface);height:52px;padding:9px 16px;border-top:1px solid var(--border2);display:flex;align-items:center;gap:10px;flex-shrink:0;transition:margin-bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.4s;}
#rdr.ui-hidden .rtop { margin-top: -50px; }
#rdr.ui-hidden .rbot { margin-bottom: -52px; }

.back-btn{background:var(--green4);border:1px solid var(--green3);color:var(--green);padding:6px 14px;border-radius:14px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600;transition:all .4s;}
.back-btn:hover{background:var(--green);color:#fff;}
.rtitle{flex:1;font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.raction{display:flex;gap:2px;}
.ibtn{background:none;border:none;color:var(--text3);cursor:pointer;padding:7px;border-radius:8px;transition:all .4s;line-height:1;}
.ibtn:hover{background:var(--green4);color:var(--green);}
.ibtn.on{color:var(--accent1);background:var(--surface2);}
.ibtn svg{width:16px;height:16px;fill:currentColor;display:block;}

.rbody{flex:1;display:flex;overflow:hidden;position:relative;}
.rside{position:absolute;left:0;top:0;bottom:0;width:258px;background:var(--surface);border-right:1px solid var(--border2);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .28s ease;z-index:40;box-shadow:2px 0 16px rgba(0,0,0,.1);}
.rside.show{transform:translateX(0);}
.stabs{display:flex;border-bottom:1px solid var(--border2);transition:border-color .4s;}
.stab{flex:1;padding:10px 4px;background:none;border:none;color:var(--text3);cursor:pointer;font-size:9.5px;font-family:inherit;transition:all .4s;letter-spacing:.7px;border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:700;text-transform:uppercase;}
.stab.on{color:var(--green);border-bottom-color:var(--green);}
.search-row{padding:9px 10px;border-bottom:1px solid var(--border2);flex-shrink:0;display:none;gap:6px;transition:border-color .4s;}
.search-row.show{display:flex;}
.sinput{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:border-color .4s, background .4s;}
.sinput:focus{border-color:var(--green);}
.sgo{background:var(--green);border:none;color:#fff;padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;transition:background .4s;}
.scontent{flex:1;overflow-y:auto;padding:8px;}
.titem{padding:7px 9px;border-radius:6px;cursor:pointer;font-size:12.5px;color:var(--text2);transition:all .4s;line-height:1.4;}
.titem:hover{background:var(--green4);color:var(--green);}
.bmitem{padding:9px;border-radius:7px;background:var(--surface2);margin-bottom:5px;cursor:pointer;border:1px solid var(--border2);transition:all .4s;}
.bmitem:hover{background:var(--green4);border-color:var(--green3);}
.bmpage{font-size:10.5px;color:var(--green);font-weight:700;transition:color .4s;}
.bmdate{font-size:11px;color:var(--text3);margin-top:1px;}
.bmdel{float:right;background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;transition:color .15s;}
.bmdel:hover{color:var(--accent1);}
.empty{color:var(--text3);font-size:12px;padding:20px 6px;text-align:center;line-height:1.8;}

.rarea{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.rcontent{flex:1;overflow:auto;padding:24px 16px;position:relative;touch-action: pan-x pan-y;} 
.theme-light .rcontent{background:#FFFDF8;}
.theme-sepia .rcontent{background:#F5EDD8;}
.theme-dark .rcontent{background:#181C14;}

/* AI Enhance FX */
.enhance-on canvas { filter: url(#ai-enhance) contrast(1.05) brightness(1.02); }

.czone{position:absolute;top:50%;transform:translateY(-50%);width:52px;height:64px;z-index:15;cursor:pointer;display:flex;align-items:center;opacity:0;transition:opacity .2s;}
.rarea:hover .czone{opacity:.55;}
.czone:hover{opacity:1!important;}
.czone.left{left:4px;justify-content:flex-start;}
.czone.right{right:4px;justify-content:flex-end;}
.carrow{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.93);border:1.5px solid var(--green3);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--green);box-shadow:0 2px 10px rgba(0,0,0,.1);transition:all .4s;pointer-events:none;}
.czone:hover .carrow{background:var(--green);color:#fff;box-shadow:0 3px 14px rgba(0,0,0,.2);}
.cwrap{display:table;margin:0 auto;transition:transform 0.1s; transform-origin: center top;} 
.cwrap.dbl{display:flex;flex-direction:row;justify-content:center;gap:6px;align-items:flex-start;margin:0 auto;width:max-content;}
.cwrap.dbl canvas{max-width:none;}
.pdiv{width:2px;background:var(--border2);align-self:stretch;flex-shrink:0;transition:background .4s;}
canvas{display:block;box-shadow:0 3px 18px rgba(0,0,0,.12);border-radius:1px;}
#epub-area{width:100%;max-width:760px;}
#txt-area{display:none;width:100%;max-width:700px;margin:0 auto;}

/* Settings panel */
.spanel{position:absolute;top:0;right:0;height:100%;width:258px;background:var(--surface);border-left:1px solid var(--border2);padding:16px 14px;display:flex;flex-direction:column;gap:16px;transform:translateX(258px);transition:transform .28s ease;z-index:10;overflow-y:auto;}
.spanel.show{transform:translateX(0);box-shadow:-2px 0 16px rgba(0,0,0,.08);}
.shd{font-size:10.5px;color:var(--green);letter-spacing:2px;text-transform:uppercase;padding-bottom:10px;border-bottom:1px solid var(--border2);font-weight:700;transition:border-color .4s, color .4s;}
.sg label{display:block;font-size:9.5px;color:var(--text3);margin-bottom:7px;letter-spacing:.7px;text-transform:uppercase;font-weight:700;}
.theme-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
.tbtn{padding:9px 3px;border-radius:7px;cursor:pointer;font-size:11px;border:2px solid transparent;transition:all .4s;font-family:inherit;font-weight:600;}
.tbtn.light{background:#FFFDF8;color:#3A2A18;border-color:var(--border);}
.tbtn.sepia{background:#F5EDD8;color:#5A3A18;border-color:#D8C8A0;}
.tbtn.dark{background:#181C14;color:#D0E8C0;border-color:#3A4030;}
.tbtn.on{border-color:var(--green)!important;box-shadow:0 0 0 2px var(--green3);}
.row3{display:flex;align-items:center;gap:8px;}
.smbtn{background:var(--bg);border:1px solid var(--border);color:var(--text);height:32px;min-width:32px;border-radius:7px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;font-family:inherit;font-weight:600;padding:0 8px;transition:all .4s;}
.smbtn:hover{background:var(--green4);border-color:var(--green3);color:var(--green);}
.smval{color:var(--text);font-size:13px;min-width:38px;text-align:center;font-weight:600;}

/* AI Slider */
.ai-slider{width:100%; -webkit-appearance:none; background:transparent; margin-top:4px;}
.ai-slider::-webkit-slider-runnable-track{width:100%; height:6px; cursor:pointer; background:var(--border2); border-radius:3px; transition:background .4s;}
.ai-slider::-webkit-slider-thumb{height:16px; width:16px; border-radius:50%; background:var(--green); cursor:pointer; -webkit-appearance:none; margin-top:-5px; box-shadow:0 1px 4px rgba(0,0,0,.2); transition:transform .2s;}
.ai-slider::-webkit-slider-thumb:hover{transform:scale(1.2);}

.fflist{display:flex;flex-direction:column;gap:4px;}
.ffbtn{padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:7px;cursor:pointer;color:var(--text2);text-align:left;transition:all .4s;font-size:12.5px;font-family:inherit;}
.ffbtn:hover{background:var(--green4);border-color:var(--green3);}
.ffbtn.on{border-color:var(--green);color:var(--green);background:var(--green4);font-weight:600;}
.lhrow{display:flex;gap:5px;}
.lhbtn{flex:1;padding:6px;background:var(--bg);border:1px solid var(--border);border-radius:7px;cursor:pointer;color:var(--text2);font-size:11px;transition:all .4s;text-align:center;font-family:inherit;font-weight:500;}
.lhbtn:hover{background:var(--green4);}
.lhbtn.on{border-color:var(--green);color:var(--green);background:var(--green4);}
.lyrow{display:flex;gap:5px;}
.lybtn{flex:1;padding:9px 4px;background:var(--bg);border:2px solid var(--border);border-radius:7px;cursor:pointer;color:var(--text2);font-size:10.5px;transition:all .4s;text-align:center;font-family:inherit;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;}
.lybtn:hover{background:var(--green4);}
.lybtn.on{border-color:var(--green);color:var(--green);background:var(--green4);}
.lyico{font-size:15px;}
.statinfo{font-size:12px;color:var(--text3);line-height:2.1;}
.statinfo strong{color:var(--green);transition:color .4s;}
.nbtn{background:var(--green4);border:1px solid var(--green3);color:var(--green);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .4s;flex-shrink:0;}
.nbtn:hover{background:var(--green);color:#fff;}
.nbtn:disabled{opacity:.28;cursor:default;background:var(--bg);}
.ptrack{flex:1;height:5px;background:var(--border2);border-radius:3px;cursor:pointer;transition:background .4s;}
.pfill{height:100%;background:linear-gradient(90deg,var(--green),var(--sky));border-radius:3px;transition:width .2s, background .4s;}
.pinfo{font-size:12px;color:var(--text3);min-width:66px;text-align:center;font-weight:500;}

/* Loading */
.loverlay{position:absolute;inset:0;background:rgba(244,249,241,.88);display:none;align-items:center;justify-content:center;z-index:30;flex-direction:column;gap:12px;}
.loverlay.show{display:flex;}
.spin{width:34px;height:34px;border:3px solid var(--green3);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

/* Toast & Modals */
.toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--green);color:#fff;padding:8px 18px;border-radius:18px;font-size:12.5px;font-weight:600;opacity:0;transition:all .4s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:center;justify-content:center;}
.mbg.show{display:flex;}
.mbox{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:26px;max-width:380px;width:90%;box-shadow:0 14px 40px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto;}
.mtitle{color:var(--green);font-size:16px;font-weight:700;margin-bottom:10px;transition:color .4s;}
.mbody{color:var(--text2);font-size:13px;line-height:1.7;margin-bottom:18px;}
.mbtns{display:flex;gap:8px;justify-content:flex-end;}
.mbtn{padding:8px 18px;border-radius:18px;cursor:pointer;font-size:13px;font-family:inherit;border:1px solid var(--border);color:var(--text2);background:var(--bg);font-weight:500;transition:all .4s;}
.mbtn:hover{background:var(--green4);}
.mbtn.pri{background:var(--green);color:#fff;border-color:var(--green);}
.mbtn.pri:hover{filter:brightness(0.9);}
.minput{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:all .4s;}
.minput:focus{border-color:var(--green);}

/* Color Grid */
.color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px;}
.c-btn{height:36px;border-radius:8px;border:2px solid transparent;cursor:pointer;transition:all .2s;}
.c-btn:hover{transform:scale(1.1);}
.c-btn.on{border-color:var(--text);box-shadow:0 0 0 2px var(--surface), 0 0 0 4px var(--text);}

/* Context menu */
.ctx{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:6px 0;z-index:200;box-shadow:0 6px 20px rgba(0,0,0,.15);min-width:158px;display:none;transition:border-color .4s;}
.ctx.show{display:block;}
.citem{padding:8px 14px;font-size:13px;color:var(--text2);cursor:pointer;transition:background .4s, color .4s;}
.citem:hover{background:var(--green4);color:var(--green);}
.csep{height:1px;background:var(--border2);margin:4px 0;transition:background .4s;}
.drop{position:fixed;inset:0;background:rgba(0,0,0,.1);z-index:50;display:none;align-items:center;justify-content:center;pointer-events:none;}
.drop.show{display:flex;}
.dropbox{background:var(--surface);border:3px dashed var(--green);border-radius:18px;padding:40px 56px;text-align:center;color:var(--green);transition:all .4s;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--surface2);}
::-webkit-scrollbar-thumb{background:var(--green3);border-radius:3px;}
.blob{position:fixed;border-radius:50%;pointer-events:none;opacity:.05;z-index:0;transition:background .4s;}
.fsbtn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:6px 7px;border-radius:7px;transition:all .4s;flex-shrink:0;line-height:1;}
.fsbtn:hover{background:var(--green4);color:var(--green);}

// ── INDEXED DB ──
const DB_NAME = 'RafimDB';
const idb = {
  db: null,
  async init() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('books')) {
          db.createObjectStore('books', { keyPath: 'id' });
        }
      };
      req.onsuccess = e => { this.db = e.target.result; resolve(); };
      req.onerror = () => reject('DB Error');
    });
  },
  async getBooks() {
    return new Promise(resolve => {
      if(!this.db) return resolve([]);
      const tx = this.db.transaction('books', 'readonly');
      const req = tx.objectStore('books').getAll();
      req.onsuccess = e => resolve(e.target.result || []);
      req.onerror = () => resolve([]);
    });
  },
  async saveBook(book) {
    return new Promise(resolve => {
      if(!this.db) return resolve();
      const tx = this.db.transaction('books', 'readwrite');
      tx.objectStore('books').put(book);
      tx.oncomplete = resolve;
    });
  },
  async deleteBook(id) {
    return new Promise(resolve => {
      if(!this.db) return resolve();
      const tx = this.db.transaction('books', 'readwrite');
      tx.objectStore('books').delete(id);
      tx.oncomplete = resolve;
    });
  }
};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dk(h,a){try{return`rgb(${Math.max(0,parseInt(h.slice(1,3),16)-a)},${Math.max(0,parseInt(h.slice(3,5),16)-a)},${Math.max(0,parseInt(h.slice(5,7),16)-a)})`;}catch{return h;}}
let toastT;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2600);}
let topToastT;
function topToast(m){const el=document.getElementById('top-toast');el.textContent=m;el.classList.add('show');clearTimeout(topToastT);topToastT=setTimeout(()=>el.classList.remove('show'),2000);}

function renderThemeGrid() {
  const g = document.getElementById('theme-colors');
  g.innerHTML = APP_COLORS.map(c => 
    `<button class="c-btn ${ST.appTheme===c.id?'on':''}" style="background:linear-gradient(135deg, ${c.c1}, ${c.ac1})" onclick="setAppTheme('${c.id}')" title="${c.n}"></button>`

}

    document.documentElement.style.setProperty('--green2', tInfo.c2);
    document.documentElement.style.setProperty('--green3', tInfo.c3);
    document.documentElement.style.setProperty('--green4', tInfo.c4);
    document.documentElement.style.setProperty('--accent1', tInfo.ac1);
    document.documentElement.style.setProperty('--accent2', tInfo.ac2);
    document.documentElement.style.setProperty('--bg', tInfo.bg);
    document.documentElement.style.setProperty('--shelf', tInfo.sh);
    document.documentElement.style.setProperty('--shelf-top', tInfo.sht);
    document.documentElement.style.setProperty('--shelf-edge', tInfo.she);

// ── COLLECTION RENDER (Sekmeler) ──
function renderCols() {
  const cb = document.getElementById('col-bar');
  cb.innerHTML = '';
  
  const root = document.createElement('button');
  root.className = 'col-tab' + (ST.activeCol === null ? ' on' : '');
  root.textContent = t('all_books');
  root.addEventListener('click', () => { ST.activeCol = null; renderCols(); renderLib(); });
  root.addEventListener('dragover', e => { e.preventDefault(); root.classList.add('drag-over'); });
  root.addEventListener('dragleave', () => root.classList.remove('drag-over'));
  root.addEventListener('drop', e => dropOnCol(e, null, root));
  cb.appendChild(root);

  ST.cols.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'col-tab' + (ST.activeCol === c.id ? ' on' : '');
    btn.textContent = c.name;
    btn.addEventListener('click', () => { ST.activeCol = c.id; renderCols(); renderLib(); });
    btn.addEventListener('dragover', e => { e.preventDefault(); btn.classList.add('drag-over'); });
    btn.addEventListener('dragleave', () => btn.classList.remove('drag-over'));
    btn.addEventListener('drop', e => dropOnCol(e, c.id, btn));
    
    btn.addEventListener('contextmenu', e => {
      e.preventDefault();
      ST.ctxCol = c;
      const m = document.getElementById('ctx-col');
      m.classList.add('show');
      m.style.left = Math.min(e.clientX, window.innerWidth-168) + 'px';
      m.style.top = Math.min(e.clientY, window.innerHeight-120) + 'px';
    });
    cb.appendChild(btn);
  });

  const add = document.createElement('button');
  add.className = 'col-tab col-add';
  add.textContent = t('new_list');
  add.addEventListener('click', () => {
    showModal(t('new_list'), '<input id="col-name" class="minput">', [
      {label:t('can'), fn:closeModal},
      {label:t('ok'), pri:true, fn:() => {
        const v = document.getElementById('col-name').value.trim();
        if(v) { ST.cols.push({id: 'c'+Date.now(), name:v}); saveLocal(); renderCols(); }
        closeModal();
      }}
    ]);
    setTimeout(()=>document.getElementById('col-name')?.focus(), 80);
  });
  cb.appendChild(add);

  const activeName = ST.activeCol ? ST.cols.find(c=>c.id===ST.activeCol)?.name : t('all_books').replace('📚 ','');
  document.getElementById('shelf-title').innerHTML = `📚 ${esc(activeName)}`;
}

function dropOnCol(e, colId, btn) {
  e.preventDefault();
  btn.classList.remove('drag-over');
  const dragId = e.dataTransfer.getData('text/plain');
  const bk = ST.books.find(b => b.id === dragId);
  if(bk && bk.colId !== colId) {
    bk.colId = colId;
    idb.saveBook(bk);
    renderLib();
    toast(t('moved'));
  }
}

// ── LIBRARY RENDER ──
function renderLib(){
  const el=document.getElementById('books');el.innerHTML='';
  
  ST.books.sort((a,b) => (a.order||0) - (b.order||0));
  const filteredBooks = ST.books.filter(b => ST.activeCol ? b.colId === ST.activeCol : true);

  filteredBooks.forEach(b=>{
    const d=document.createElement('div');
    d.className='bk'; d.dataset.id=b.id; d.draggable=true;
    
    d.addEventListener('click',()=>openBook(b));
    d.addEventListener('contextmenu',e=>showCtx(e,b));
    
    d.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', b.id);
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => d.style.opacity = '0.4', 0);
    });
    d.addEventListener('dragend', () => d.style.opacity = '1');
    d.addEventListener('dragenter', e => {
      if(e.dataTransfer.types.includes('text/plain')) { e.preventDefault(); d.classList.add('drag-over'); }
    });
    d.addEventListener('dragleave', () => d.classList.remove('drag-over'));
    d.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
    d.addEventListener('drop', e => {
      e.preventDefault(); e.stopPropagation(); d.classList.remove('drag-over');
      const dragId = e.dataTransfer.getData('text/plain');
      if(dragId && dragId !== b.id) reorderBooks(dragId, b.id);
    });

    const badge=b.progress>=100?`<span class="bk-bdg bdg-done">${t('stat_done').toUpperCase()}</span>`:b.progress===0?`<span class="bk-bdg bdg-new">YENİ</span>`:'';
    const coverHtml=b.coverUrl
      ?`<img src="${esc(b.coverUrl)}" alt="">`
      :`<div class="bk-fallback" style="background:linear-gradient(148deg,${b.color},${dk(b.color,55)})">
          <div class="bk-spine"></div>
          <div class="bk-ttl">${esc(b.title)}</div>
          <div class="bk-auth">${esc(b.author)}</div>
        </div>`;
    d.innerHTML=`<div class="bk-cover">${coverHtml}${badge}
        <div class="bk-prog"><div class="bk-prog-fill" style="width:${b.progress||0}%"></div></div>
      </div>
      <div class="bk-meta">
        <div class="bk-name" title="${esc(b.title)}">${esc(b.title)}</div>
        <div class="bk-pct">${b.progress||0}%</div>
      </div>`;
    el.appendChild(d);
  });

  const add=document.createElement('div');add.className='add-card';
  add.innerHTML=`<div class="add-card-icon">🌿</div><div class="add-card-txt">${t('add_btn').replace('＋ ','')}<br><small>PDF · EPUB · TXT</small></div>`;
  add.addEventListener('click',()=>showAddModal());
  el.appendChild(add);
  
  const s=document.getElementById('stats');
  const done=ST.books.filter(b=>b.progress>=100).length;
  const rdg=ST.books.filter(b=>b.progress>0&&b.progress<100).length;
  const unr=ST.books.filter(b=>!b.progress).length;

async function addFile(file){
  const ext=file.name.split('.').pop().toLowerCase();
  if(!['pdf','epub','txt'].includes(ext)){toast('Format: pdf, epub, txt');return;}
  const color = ['#D4507A','#4E9A6A','#5080C8','#C86A28','#7A6ACC','#3A8A88','#C84060','#507A30'][ST.books.length%8];
  
  const book={
    id:'b'+Date.now()+Math.random().toString(36).slice(2),
    title:file.name.replace(/\.[^.]+$/,''),
    author:'', color, progress:0, type:ext, file, coverUrl:null,
    colId: ST.activeCol, order: ST.books.length
  };
  ST.books.push(book);
  renderLib();
  toast(`"${book.title}" ${t('added')}`);
  await idb.saveBook(book); 
  if(ext==='epub') extractEpubMeta(book);
  else if(ext==='pdf') extractPdfCover(book);
}

async function extractEpubMeta(book){
  try{
    const url=URL.createObjectURL(book.file);
    const eb=ePub(url);
    const [meta,coverUrl]=await Promise.all([ eb.loaded.metadata.catch(()=>null), eb.coverUrl().catch(()=>null) ]);
    if(meta?.title&&meta.title.length>1)book.title=meta.title;
    if(meta?.creator)book.author=meta.creator;
    if(coverUrl)book.coverUrl=coverUrl;
    eb.destroy(); renderLib(); idb.saveBook(book);
  }catch(e){}
}
async function extractPdfCover(book){
  try{
    const buf=await book.file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:new Uint8Array(buf),cMapUrl:CMAP_URL,cMapPacked:CMAP_PACKED}).promise;
    const pg=await pdf.getPage(1);
    const vp=pg.getViewport({scale:0.4});
    const cv=document.createElement('canvas');cv.width=vp.width;cv.height=vp.height;
    await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
    book.coverUrl=cv.toDataURL('image/jpeg',.82);
    pdf.destroy(); renderLib(); idb.saveBook(book);
  }catch(e){}
}

// ── PDF ──
let renderId = 0; 
async function loadPDF(book){
  showLoad(true);
  try{
    const buf=await book.file.arrayBuffer();
    ST.pdfDoc=await pdfjsLib.getDocument({data:new Uint8Array(buf),cMapUrl:CMAP_URL,cMapPacked:CMAP_PACKED}).promise;
    ST.pages=ST.pdfDoc.numPages;
    ST.page = Math.max(1, Math.round((book.progress / 100) * ST.pages) || 1);
    const ol=await ST.pdfDoc.getOutline().catch(()=>null);
    ST.toc=ol?flatOl(ol):[];
    await renderPDF(ST.page);updNav();
    if(ST.sideOpen)renderTab();
  }catch(e){toast('Error: '+(e.message||e));closeReader();}
  finally{showLoad(false);}
}
function flatOl(ol,d=0){const r=[];(ol||[]).forEach(it=>{r.push({title:it.title,dest:it.dest,depth:d});if(it.items?.length)r.push(...flatOl(it.items,d+1));});return r;}

async function renderPDF(n){
  if(!ST.pdfDoc)return;
  const myRenderId = ++renderId;
  const wrap=document.getElementById('cwrap');
  const dbl=ST.cfg.layout==='double';
  
  async function onePage(num){
    if(num<1||num>ST.pdfDoc.numPages)return null;
    const pg=await ST.pdfDoc.getPage(num);
    const sc=getPdfScale(dbl);
    const vp=pg.getViewport({scale:sc});
    const cv=document.createElement('canvas');cv.width=Math.round(vp.width);cv.height=Math.round(vp.height);
    await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
    return cv;
  }
  
  if(dbl){
    const L=n%2===0?n-1:n;const R=L+1;
    const [cvL,cvR]=await Promise.all([onePage(L),onePage(R)]);
    if(myRenderId !== renderId) return; 
    wrap.className='cwrap'+(dbl?' dbl':''); wrap.innerHTML='';
    if(cvL)wrap.appendChild(cvL);
    if(cvL&&cvR){const d=document.createElement('div');d.className='pdiv';wrap.appendChild(d);}
    if(cvR)wrap.appendChild(cvR);
    if(ST.page!==L){ST.page=L;updNav();}
  }else{
    const cv=await onePage(n);
    if(myRenderId !== renderId) return;
    wrap.className='cwrap'; wrap.innerHTML='';
    if(cv)wrap.appendChild(cv);
  }
  document.getElementById('rcontent').scrollTop=0;
}
function getPdfScale(dbl){
  const rc=document.getElementById('rcontent');
  const w=rc.clientWidth-32;
  return dbl?((w/2-8)/595)*ST.cfg.zoom:(w/595)*ST.cfg.zoom;
}

// ── EPUB ──
async function loadEPUB(book){
  showLoad(true);
  try{
    await new Promise(r => setTimeout(r, 50)); 
    document.getElementById('cwrap').style.display='none';
    const ea=document.getElementById('epub-area');
    const rc=document.getElementById('rcontent');
    const W = Math.max(300, Math.min(rc.clientWidth - 32, 760));
    const H = Math.max(400, window.innerHeight - 180);
    ea.style.cssText=`display:block;width:${W}px;height:${H}px;margin:0 auto;`; ea.innerHTML='';
    const buf = await book.file.arrayBuffer();
    ST.epubBook = ePub(buf);
    ST.epubRend = ST.epubBook.renderTo(ea, {width:W, height:H, spread:'none', flow:'paginated'});
    await ST.epubRend.display();
    ST.epubBook.loaded.metadata.then(m=>{
      if(m?.title&&m.title.length>1){book.title=m.title;document.getElementById('rtitle').textContent=m.title;}
      if(m?.creator)book.author=m.creator; renderLib();
    }).catch(()=>{});
    ST.epubBook.loaded.navigation.then(nav=>{
      ST.toc=(nav?.toc||[]).flatMap(t=>[{title:t.label?.trim()||'—',href:t.href,depth:0},...(t.subitems||[]).map(s=>({title:s.label?.trim()||'—',href:s.href,depth:1}))]);
      if(ST.sideOpen)renderTab();
    }).catch(()=>{});
    ST.epubRend.on('relocated',loc=>{
      if(ST.epubBook.locations?.total&&loc?.start?.cfi){
        const idx=ST.epubBook.locations.locationFromCfi(loc.start.cfi);
        if(idx>=0){ST.page=idx+1;updNav();updBmBtn();}
      }
    });
    ST.epubBook.locations.generate(1200).then(()=>{
      ST.pages=ST.epubBook.locations.total||100;
      if (book.progress > 0 && book.progress <= 100) {
        let cfi = ST.epubBook.locations.cfiFromPercentage(book.progress/100);
        if(cfi) ST.epubRend.display(cfi);
      }
      updNav();
    }).catch(()=>{ST.pages=100;updNav();});
    ST.pages=100;ST.page=1;updNav();
  }catch(e){
    toast('Error: '+(e.message||e)); closeReader();
  }finally{
    showLoad(false);
  }
}

// ── TXT ──
async function loadTXT(book){
  showLoad(true);
  try{
    document.getElementById('cwrap').style.display='none';
    const ta=document.getElementById('txt-area');ta.style.display='block';
    const text=await book.file.text();
    book._pages=[];for(let i=0;i<text.length;i+=3000)book._pages.push(text.slice(i,i+3000));
    if(!book._pages.length)book._pages=['(Boş dosya)'];
    ST.pages=book._pages.length;
    ST.page = Math.max(1, Math.round((book.progress / 100) * ST.pages) || 1);
    ST.toc=book._pages.map((_,i)=>({title:'Bölüm '+(i+1),depth:0,page:i+1}));
    renderTXT(ST.page);updNav();if(ST.sideOpen)renderTab();
  }catch(e){toast('Dosya okunamadı.');closeReader();}
  finally{showLoad(false);}
}
function renderTXT(n){
  const bk=ST.cur;if(!bk?._pages)return;
  const ta=document.getElementById('txt-area');
  const{theme,fs,ff,lh}=ST.cfg;
  const clr=theme==='dark'?'#D0E8C0':theme==='sepia'?'#5A3A18':'#2A3828';
  ta.style.cssText=`display:block;width:100%;max-width:700px;margin:0 auto;font-family:${ff};font-size:${fs}px;line-height:${lh};color:${clr};white-space:pre-wrap;padding:0 8px;`;
  ta.textContent=bk._pages[n-1]||'';
  document.getElementById('rcontent').scrollTop=0;
}

// ── NAVIGATION ──
function pageStep(){return ST.cur?.type==='pdf'&&ST.cfg.layout==='double'?2:1;}
async function prevPage(){
  if(ST.page<=1)return;
  if(ST.cur?.type==='epub'){await ST.epubRend?.prev();ST.pagesRead++;return;}
  ST.page=Math.max(1,ST.page-pageStep());ST.pagesRead++;
  await goPage();updNav();updBmBtn();
}
async function nextPage(){
  if(ST.page>=ST.pages)return;
  if(ST.cur?.type==='epub'){await ST.epubRend?.next();ST.pagesRead++;return;}
  ST.page=Math.min(ST.pages,ST.page+pageStep());ST.pagesRead++;
  await goPage();updNav();updBmBtn();
}
async function goPage(){
  const t=ST.cur?.type;
  if(t==='pdf')await renderPDF(ST.page);
  else if(t==='txt')renderTXT(ST.page);
  if(ST.setOpen)updStats();
}
function updNav(){
  document.getElementById('pinfo').textContent=`${ST.page} / ${ST.pages}`;
  const pct=ST.pages>1?(ST.page-1)/(ST.pages-1)*100:0;
  document.getElementById('pfill').style.width=Math.round(pct)+'%';
  document.getElementById('prev-btn').disabled=ST.page<=1;
  document.getElementById('next-btn').disabled=ST.page>=ST.pages;
}

// ── BOOKMARKS ──
function toggleBm(){
  const id=ST.cur?.id;if(!id)return;
  if(!ST.bmarks[id])ST.bmarks[id]=[];
  const idx=ST.bmarks[id].findIndex(b=>b.page===ST.page);
  if(idx>=0){ST.bmarks[id].splice(idx,1);toast(t('removed'));}
  else{ST.bmarks[id].push({page:ST.page,date:new Date().toLocaleDateString()});toast('Saved 🔖');}
  saveLocal(); updBmBtn();if(ST.sideOpen&&ST.activeTab==='bm')renderTab();
}
function updBmBtn(){
  const id=ST.cur?.id;
  document.getElementById('btn-bm').classList.toggle('on',!!(id&&(ST.bmarks[id]||[]).some(b=>b.page===ST.page)));
}
async function jumpBm(page){ST.page=page;await goPage();updNav();updBmBtn();}
function delBm(id,page,e){
  e.stopPropagation(); ST.bmarks[id]=(ST.bmarks[id]||[]).filter(b=>b.page!==page);
  saveLocal(); updBmBtn(); renderTab();
}

// ── SIDEBAR ──
function toggleSide(){if(ST.sideOpen)closeSide();else openSide();}
function openSide(){ST.sideOpen=true;document.getElementById('rside').classList.add('show');document.getElementById('btn-side').classList.add('on');renderTab();}
function closeSide(){ST.sideOpen=false;document.getElementById('rside').classList.remove('show');document.getElementById('btn-side').classList.remove('on');}
function renderTab(){
  const c=document.getElementById('scontent');
  if(ST.activeTab==='toc'){
    if(!ST.toc.length){c.innerHTML=`<div class="empty">${t('empT')}</div>`;return;}
    c.innerHTML=ST.toc.map((it,i)=>`<div class="titem" style="padding-left:${8+it.depth*14}px" data-i="${i}">${esc(it.title)}</div>`).join('');
    c.querySelectorAll('.titem').forEach(el=>el.addEventListener('click',()=>goTOC(+el.dataset.i)));
  }else if(ST.activeTab==='bm'){
    const id=ST.cur?.id;const bms=(id&&ST.bmarks[id])||[];
    if(!bms.length){c.innerHTML=`<div class="empty">${t('empB')}</div>`;return;}
    c.innerHTML='';bms.forEach(b=>{
      const d=document.createElement('div');d.className='bmitem';
      d.innerHTML=`<button class="bmdel">✕</button><div class="bmpage">${b.page}</div><div class="bmdate">${b.date}</div>`;
      d.addEventListener('click',()=>jumpBm(b.page));
      d.querySelector('.bmdel').addEventListener('click',e=>delBm(id,b.page,e));
      c.appendChild(d);
    });
  }else{
    if(!ST.srResults.length){c.innerHTML='';return;}
    c.innerHTML=`<div style="font-size:10px;color:var(--green);padding:4px 8px 8px;font-weight:700">${ST.srResults.length} ${t('srch_found')}</div>`;
    ST.srResults.forEach(r=>{
      const d=document.createElement('div');d.className='bmitem';
      d.innerHTML=`<div class="bmpage">${r.page}</div><div class="bmdate" style="line-height:1.4;font-size:11px">${esc(r.snip)}</div>`;
      d.addEventListener('click',()=>jumpBm(r.page));
      c.appendChild(d);
    });
  }
}
async function goTOC(i){
  const it=ST.toc[i];if(!it)return;
  if(ST.cur?.type==='pdf'&&it.dest){
    try{const dest=await ST.pdfDoc.getDestination(it.dest);if(dest){const ref=await ST.pdfDoc.getPageIndex(dest[0]);ST.page=ref+1;await renderPDF(ST.page);updNav();}}catch(e){}
  }else if(ST.cur?.type==='epub'&&ST.epubRend)ST.epubRend.display(it.href);
  else if(ST.cur?.type==='txt'&&it.page){ST.page=it.page;renderTXT(ST.page);updNav();}
}

// ── SEARCH ──
async function doSearch(){
  const q=document.getElementById('sinput').value.trim();
  if(!q)return;
  if(ST.cur?.type!=='pdf'){toast('PDF Only');return;}
  toast(t('loading'));ST.srResults=[];
  for(let i=1;i<=ST.pdfDoc.numPages&&ST.srResults.length<60;i++){
    const pg=await ST.pdfDoc.getPage(i);
    const ct=await pg.getTextContent();
    const tx=ct.items.map(x=>x.str).join(' ');
    if(tx.toLowerCase().includes(q.toLowerCase())){
      const idx=tx.toLowerCase().indexOf(q.toLowerCase());
      ST.srResults.push({page:i,snip:'…'+tx.slice(Math.max(0,idx-30),idx+q.length+30).trim()+'…'});
    }
  }
  toast(ST.srResults.length?ST.srResults.length+' '+t('srch_found'):t('srch_not'));
  renderTab();
}

    {label:t('ctx_del'), pri:true, fn:() => {
      ST.cols = ST.cols.filter(x => x.id !== c.id);
      ST.books.forEach(b => { if(b.colId === c.id) { b.colId = null; idb.saveBook(b); } });
      if(ST.activeCol === c.id) ST.activeCol = null;
      saveLocal(); renderCols(); renderLib(); closeModal(); toast(t('removed'));
    }}
  ]);
});

// ── PINCH-TO-ZOOM, DOUBLE TAP & SINGLE TAP TO HIDE UI ──
const rc = document.getElementById('rcontent');
let initialDist = null;
let initialZoom = 1;
let tapTimer = null;
let lastTapTime = 0;

rc.addEventListener('touchstart', e => {
   if(e.touches.length === 2) {
       initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
       initialZoom = ST.cfg.zoom;
   }
}, {passive: false});

rc.addEventListener('touchmove', e => {
   if(e.touches.length === 2 && initialDist) {
       e.preventDefault();
       const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
       const scale = dist / initialDist;
       let nz = Math.max(0.3, Math.min(3.0, initialZoom * scale));
       document.getElementById('cwrap').style.transform = `scale(${nz/initialZoom})`;
       document.getElementById('zm-pct').textContent = Math.round(nz * 100) + '%';
   }
}, {passive: false});

rc.addEventListener('touchend', e => {
   if(e.touches.length < 2 && initialDist) {
       const tr = document.getElementById('cwrap').style.transform;
       document.getElementById('cwrap').style.transform = '';
       if(tr && tr.includes('scale')) {
          const match = tr.match(/scale\(([^)]+)\)/);
          if(match) {
             ST.cfg.zoom = Math.max(0.3, Math.min(3.0, +(initialZoom * parseFloat(match[1])).toFixed(2)));
             saveLocal(); syncSettingsUI();
             if(ST.cur?.type==='pdf') renderPDF(ST.page);
          }
       }
       initialDist = null;
   }
});

rc.addEventListener('pointerup', e => {
  if(initialDist) return; 
  if(e.target.closest('.czone') || e.target.closest('.spanel') || e.target.closest('.rside')) return;

  const now = Date.now();
  if(now - lastTapTime < 300) {
      clearTimeout(tapTimer);
      ST.cfg.zoom = 1.0;
      document.getElementById('cwrap').style.transform = '';
      saveLocal(); syncSettingsUI();
      if(ST.cur?.type==='pdf') renderPDF(ST.page);
      e.preventDefault();
  } else {
      tapTimer = setTimeout(() => {
          document.getElementById('rdr').classList.toggle('ui-hidden');
      }, 300);
  }
  lastTapTime = now;
});

// ── AI ENHANCE SLIDER LOGIC ──
function applyAIFilter(val) {
   const k = val / 25; 
   const mid = 1 + 4 * k;
   const matrix = `0 ${-k} 0 ${-k} ${mid} ${-k} 0 ${-k} 0`;
   document.getElementById('ai-matrix').setAttribute('kernelMatrix', matrix);
   
   if(val > 0) document.getElementById('rcontent').classList.add('enhance-on');
   else document.getElementById('rcontent').classList.remove('enhance-on');
}

document.getElementById('ai-slider').addEventListener('input', e => {
    applyAIFilter(parseInt(e.target.value));
});
document.getElementById('ai-slider').addEventListener('change', e => {
    ST.cfg.aiLevel = parseInt(e.target.value);
    saveLocal();
});


document.querySelectorAll('[data-theme]').forEach(b=>b.addEventListener('click',()=>{

}));

});
document.getElementById('fz-up').addEventListener('click',()=>{

document.getElementById('zm-dn').addEventListener('click',()=>{

});
document.getElementById('zm-up').addEventListener('click',()=>{

});
document.getElementById('zm-pct').addEventListener('click',()=>{
  ST.cfg.zoom=1.0;document.getElementById('zm-pct').textContent='100%';
  if(ST.cur?.type==='pdf')renderPDF(ST.page); saveLocal();
});
document.querySelectorAll('[data-layout]').forEach(b=>b.addEventListener('click',()=>{
  ST.cfg.layout=b.dataset.layout;
  document.querySelectorAll('[data-layout]').forEach(x=>x.classList.toggle('on',x.dataset.layout===ST.cfg.layout));
  if(ST.cur?.type==='pdf')renderPDF(ST.page); saveLocal();
}));
document.querySelectorAll('[data-ff]').forEach(b=>b.addEventListener('click',()=>{
  ST.cfg.ff=b.dataset.ff;
  document.querySelectorAll('[data-ff]').forEach(x=>x.classList.toggle('on',x===b));
  if(ST.cur?.type==='txt')renderTXT(ST.page); saveLocal();
}));
document.querySelectorAll('[data-lh]').forEach(b=>b.addEventListener('click',()=>{
  ST.cfg.lh=parseFloat(b.dataset.lh);
  document.querySelectorAll('[data-lh]').forEach(x=>x.classList.toggle('on',x===b));
  if(ST.cur?.type==='txt')renderTXT(ST.page); saveLocal();
}));
document.querySelectorAll('.stab').forEach(b=>b.addEventListener('click',()=>{
  ST.activeTab=b.dataset.tab;
  document.querySelectorAll('.stab').forEach(x=>x.classList.toggle('on',x===b));
  document.getElementById('srow').classList.toggle('show',ST.activeTab==='srch');
  renderTab();
}));

document.addEventListener('keydown',e=>{
  if(document.activeElement?.tagName==='INPUT')return;
  if(!ST.cur)return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();nextPage();}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();prevPage();}
  if(e.key==='Escape'){if(ST.setOpen)closeSet();else if(ST.sideOpen)closeSide();}
  if(e.key==='b'||e.key==='B')toggleBm();
  if(e.key==='f'||e.key==='F')toggleFS();
});

function toggleFS(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen?.().catch(()=>{});
  else document.exitFullscreen?.();
}

function syncSettingsUI() {
  document.getElementById('fz-val').textContent = ST.cfg.fs;
  document.getElementById('zm-pct').textContent = Math.round(ST.cfg.zoom * 100) + '%';
  document.querySelectorAll('[data-layout]').forEach(x => x.classList.toggle('on', x.dataset.layout === ST.cfg.layout));
  document.querySelectorAll('[data-ff]').forEach(x => x.classList.toggle('on', x.dataset.ff === ST.cfg.ff));
  document.querySelectorAll('[data-lh]').forEach(x => x.classList.toggle('on', parseFloat(x.dataset.lh) === ST.cfg.lh));
  document.querySelectorAll('[data-theme]').forEach(b => b.classList.toggle('on', b.dataset.theme === ST.cfg.theme));
  
  const aiVal = ST.cfg.aiLevel || 0;
  document.getElementById('ai-slider').value = aiVal;
  applyAIFilter(aiVal);
}

async function boot() {
  try {
    const savedCfg = localStorage.getItem('rafim_cfg');
    if(savedCfg) ST.cfg = {...ST.cfg, ...JSON.parse(savedCfg)};
    const savedBm = localStorage.getItem('rafim_bmarks');
    if(savedBm) ST.bmarks = JSON.parse(savedBm);
    const savedCols = localStorage.getItem('rafim_cols');
    if(savedCols) ST.cols = JSON.parse(savedCols);
    const appSet = localStorage.getItem('rafim_appset');
    if(appSet) {
       const o = JSON.parse(appSet);
       ST.lang = o.l || 'tr'; ST.appTheme = o.t || 'grn';
    }
  } catch(e) {}
  
  syncSettingsUI();
  setAppTheme(ST.appTheme);
  changeLang(ST.lang);

  try {
    await idb.init();
    const savedBooks = await idb.getBooks();
    if (savedBooks && savedBooks.length > 0) {
      ST.books.push(...savedBooks);
    }
  } catch(e) {}
  
  ST.books.forEach((b, i) => { if(b.order === undefined) b.order = i; });
  renderCols(); renderLib();
}

boot();
</script>
